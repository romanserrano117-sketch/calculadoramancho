<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Mancho - Meow Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFCC00;
            --secondary: #E67E22;
            --bg: #2C3E50;
            --accent: #FFFFFF;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            padding: 20px;
            transition: all 0.5s ease;
        }

        .brawl-card {
            background: #34495E;
            border: 6px solid #000;
            border-radius: 25px;
            padding: 25px;
            width: 100%;
            max-width: 650px;
            box-shadow: 12px 12px 0px rgba(0,0,0,0.4);
            text-align: center;
        }

        h1 {
            font-family: 'Luckiest Guy', cursive;
            color: var(--primary);
            text-shadow: 4px 4px 0px #000;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .btn-brawl {
            font-family: 'Luckiest Guy', cursive;
            width: 90%;
            padding: 15px;
            margin: 10px auto;
            font-size: 1.2rem;
            color: white;
            background: var(--primary);
            border: 4px solid #000;
            border-radius: 15px;
            cursor: pointer;
            text-shadow: 2px 2px 0px #000;
            box-shadow: 0 6px 0px rgba(0,0,0,0.3);
            display: block;
            transition: 0.1s;
        }

        .btn-brawl:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0px rgba(0,0,0,0.3);
        }

        .michi-dialog {
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .michi-icon { font-size: 50px; background: white; border-radius: 50%; padding: 10px; border: 3px solid #000; }

        .bubble {
            background: white;
            border: 3px solid #000;
            border-radius: 15px;
            padding: 10px;
            margin-left: 15px;
            position: relative;
            font-weight: bold;
            color: #333;
            flex: 1;
        }

        .section { display: none; }

        .input-group { margin: 10px 0; color: white; font-weight: bold; }
        input {
            font-family: 'Luckiest Guy', cursive;
            border: 3px solid #000;
            border-radius: 10px;
            padding: 5px;
            width: 60px;
            margin: 2px;
            text-align: center;
        }

        .res-box {
            background: #2ECC71;
            border: 4px solid #000;
            border-radius: 12px;
            padding: 15px;
            margin: 15px 0;
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 0px #000;
            white-space: pre-line;
        }

        canvas { background: white; border-radius: 15px; border: 4px solid #000; margin-top: 15px; }

        .nav-buttons { display: flex; gap: 10px; justify-content: center; }
        .btn-back { background: #E74C3C; flex: 1; }
        .btn-again { background: #3498DB; flex: 1; }
    </style>
</head>
<body>

<div class="brawl-card">
    <h1 id="title">CALCULADORA MANCHO</h1>

    <!-- MENU PRINCIPAL -->
    <div id="main-menu">
        <button class="btn-brawl" onclick="startMode('lineal')">LINEAL 🐾</button>
        <button class="btn-brawl" onclick="startMode('cuadratica')">CUADRÁTICA 🐱</button>
        <button class="btn-brawl" onclick="startMode('sistema')">SISTEMA 2X2 🐯</button>
        <button class="btn-brawl" onclick="startMode('sistema3x3')">SISTEMA 3X3 🦁</button>
    </div>

    <!-- MODO DE CALCULO -->
    <div id="calc-mode" class="section">
        <div class="michi-dialog">
            <div id="michi-img" class="michi-icon">🐱</div>
            <div class="bubble" id="michi-speech">¡Miau!</div>
        </div>

        <div id="input-container"></div>
        
        <button class="btn-brawl" onclick="process()">¡ATAQUE CALCULADO!</button>
        
        <div id="result" class="res-box" style="display:none"></div>
        <canvas id="myChart"></canvas>

        <div class="nav-buttons">
            <button class="btn-brawl btn-again" onclick="resetInputs()">REINTENTAR 🔄</button>
            <button class="btn-brawl btn-back" onclick="goHome()">MENÚ 🏠</button>
        </div>
    </div>
</div>

<script>
    let currentMode = '';
    let myChart = null;

    function startMode(mode) {
        currentMode = mode;
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('calc-mode').style.display = 'block';
        document.getElementById('result').style.display = 'none';
        if(myChart) myChart.destroy();
        document.getElementById('myChart').style.display = (mode === 'sistema3x3') ? 'none' : 'block';

        const container = document.getElementById('input-container');
        const speech = document.getElementById('michi-speech');
        const icon = document.getElementById('michi-img');

        if(mode === 'lineal') {
            icon.innerText = '🐱';
            speech.innerText = "¡Miau! Vamos por esa X.";
            container.innerHTML = '<div class="input-group">y = <input type="number" id="a" placeholder="a"> x + <input type="number" id="b" placeholder="b"></div>';
        } else if(mode === 'cuadratica') {
            icon.innerText = '🐈';
            speech.innerText = "¡Prrrr! Curvas gatunas a la vista.";
            container.innerHTML = '<div class="input-group"><input type="number" id="a">x² + <input type="number" id="b">x + <input type="number" id="c"> = 0</div>';
        } else if(mode === 'sistema') {
            icon.innerText = '🐯';
            speech.innerText = "¡Grrr! Dos líneas, un destino.";
            container.innerHTML = '<div class="input-group">L1: <input type="number" id="a1">x + <input type="number" id="b1">y = <input type="number" id="c1"></div>' +
                                  '<div class="input-group">L2: <input type="number" id="a2">x + <input type="number" id="b2">y = <input type="number" id="c2"></div>';
        } else if(mode === 'sistema3x3') {
            icon.innerText = '🦁';
            speech.innerText = "¡RAWR! ¡Esto es nivel Súper Mega Michi!";
            container.innerHTML = 
                '<div class="input-group">E1: <input type="number" id="a1">x + <input type="number" id="b1">y + <input type="number" id="c1">z = <input type="number" id="d1"></div>' +
                '<div class="input-group">E2: <input type="number" id="a2">x + <input type="number" id="b2">y + <input type="number" id="c2">z = <input type="number" id="d2"></div>' +
                '<div class="input-group">E3: <input type="number" id="a3">x + <input type="number" id="b3">y + <input type="number" id="c3">z = <input type="number" id="d3"></div>';
        }
    }

    function resetInputs() { startMode(currentMode); }
    function goHome() { 
        document.getElementById('main-menu').style.display = 'block'; 
        document.getElementById('calc-mode').style.display = 'none'; 
    }

    function process() {
        const resDiv = document.getElementById('result');
        resDiv.style.display = 'block';
        const labels = [], data1 = [], data2 = [];
        for(let i = -10; i <= 10; i++) labels.push(i);

        if(currentMode === 'lineal') {
            const a = parseFloat(document.getElementById('a').value), b = parseFloat(document.getElementById('b').value);
            const x = -b/a;
            resDiv.innerText = `¡GOLPE CRÍTICO!\nx = ${x.toFixed(2)}`;
            draw([{label: 'Trayectoria', data: labels.map(i => a*i+b), borderColor: 'orange'}]);
        } 
        else if(currentMode === 'cuadratica') {
            const a = parseFloat(document.getElementById('a').value), b = parseFloat(document.getElementById('b').value), c = parseFloat(document.getElementById('c').value);
            const d = b*b - 4*a*c;
            if(d < 0) resDiv.innerText = "¡Miau! Sin solución real";
            else {
                const x1 = ((-b+Math.sqrt(d))/(2*a)).toFixed(2), x2 = ((-b-Math.sqrt(d))/(2*a)).toFixed(2);
                resDiv.innerText = `¡DOBLE IMPACTO!\nx1 = ${x1}\nx2 = ${x2}`;
            }
            draw([{label: 'Parábola', data: labels.map(i => a*i*i + b*i + c), borderColor: 'red'}]);
        } 
        else if(currentMode === 'sistema') {
            const a1=parseFloat(document.getElementById('a1').value), b1=parseFloat(document.getElementById('b1').value), c1=parseFloat(document.getElementById('c1').value);
            const a2=parseFloat(document.getElementById('a2').value), b2=parseFloat(document.getElementById('b2').value), c2=parseFloat(document.getElementById('c2').value);
            const det = a1*b2 - a2*b1;
            if(det === 0) resDiv.innerText = "¡EMPATE! Sin solución única";
            else {
                const x = (c1*b2 - c2*b1)/det, y = (a1*c2 - a2*c1)/det;
                resDiv.innerText = `¡LOCALIZADO!\nx = ${x.toFixed(2)}, y = ${y.toFixed(2)}`;
                draw([
                    {label: 'Michi 1', data: labels.map(i => (c1-a1*i)/b1), borderColor: 'cyan'},
                    {label: 'Michi 2', data: labels.map(i => (c2-a2*i)/b2), borderColor: 'yellow'}
                ]);
            }
        } 
        else if(currentMode === 'sistema3x3') {
            const getV = (id) => parseFloat(document.getElementById(id).value);
            const a1=getV('a1'), b1=getV('b1'), c1=getV('c1'), d1=getV('d1');
            const a2=getV('a2'), b2=getV('b2'), c2=getV('c2'), d2=getV('d2');
            const a3=getV('a3'), b3=getV('b3'), c3=getV('c3'), d3=getV('d3');

            // Regla de Cramer
            const detS = a1*(b2*c3 - b3*c2) - b1*(a2*c3 - a3*c2) + c1*(a2*b3 - a3*b2);
            
            if(Math.abs(detS) < 0.0001) {
                resDiv.innerText = "¡Miau! El sistema no tiene solución única.";
            } else {
                const detX = d1*(b2*c3 - b3*c2) - b1*(d2*c3 - d3*c2) + c1*(d2*b3 - d3*b2);
                const detY = a1*(d2*c3 - d3*c2) - d1*(a2*c3 - a3*c2) + c1*(a2*d3 - a3*d2);
                const detZ = a1*(b2*d3 - b3*d2) - b1*(a2*d3 - a3*d2) + d1*(a2*b3 - a3*b2);
                
                resDiv.innerText = `¡SUPER COMBO!\nx = ${(detX/detS).toFixed(2)}\ny = ${(detY/detS).toFixed(2)}\nz = ${(detZ/detS).toFixed(2)}`;
            }
        }
    }

    function draw(datasets) {
        if(myChart) myChart.destroy();
        myChart = new Chart(document.getElementById('myChart'), {
            type: 'line',
            data: { labels: Array.from({length: 21}, (_, i) => i - 10), datasets: datasets },
            options: { responsive: true, scales: { y: { grid: { color: '#444' } } } }
        });
    }
</script>
</body>
</html>
