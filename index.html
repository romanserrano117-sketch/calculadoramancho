<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Mancho - Meow Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFCC00;
            --secondary: #E67E22;
            --bg: #2C3E50;
            --accent: #FFFFFF;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            padding: 20px;
            transition: all 0.5s ease;
        }

        .brawl-card {
            background: #34495E;
            border: 6px solid #000;
            border-radius: 25px;
            padding: 25px;
            width: 100%;
            max-width: 600px;
            box-shadow: 12px 12px 0px rgba(0,0,0,0.4);
            text-align: center;
        }

        h1 {
            font-family: 'Luckiest Guy', cursive;
            color: var(--primary);
            text-shadow: 4px 4px 0px #000;
            font-size: 2.8rem;
            margin-bottom: 20px;
        }

        /* Estilo Botones Brawl-Gato */
        .btn-brawl {
            font-family: 'Luckiest Guy', cursive;
            width: 90%;
            padding: 15px;
            margin: 10px auto;
            font-size: 1.4rem;
            color: white;
            background: var(--primary);
            border: 4px solid #000;
            border-radius: 15px;
            cursor: pointer;
            text-shadow: 2px 2px 0px #000;
            box-shadow: 0 6px 0px rgba(0,0,0,0.3);
            display: block;
            transition: 0.1s;
        }

        .btn-brawl:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0px rgba(0,0,0,0.3);
        }

        /* Burbuja de Texto y Gato */
        .michi-dialog {
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .michi-icon { font-size: 50px; background: white; border-radius: 50%; padding: 10px; border: 3px solid #000; }

        .bubble {
            background: white;
            border: 3px solid #000;
            border-radius: 15px;
            padding: 10px;
            margin-left: 15px;
            position: relative;
            font-weight: bold;
            color: #333;
            flex: 1;
        }

        .section { display: none; }

        input {
            font-family: 'Luckiest Guy', cursive;
            border: 3px solid #000;
            border-radius: 10px;
            padding: 8px;
            width: 70px;
            margin: 5px;
            text-align: center;
            font-size: 1.1rem;
        }

        .res-box {
            background: #2ECC71;
            border: 4px solid #000;
            border-radius: 12px;
            padding: 15px;
            margin: 15px 0;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 1px 1px 0px #000;
        }

        canvas { background: white; border-radius: 15px; border: 4px solid #000; margin-top: 15px; }

        .btn-back { background: #E74C3C; font-size: 1rem; padding: 10px; }
        .btn-again { background: #3498DB; }
    </style>
</head>
<body>

<div class="brawl-card">
    <h1 id="title">CALCULADORA MANCHO</h1>

    <!-- MENU PRINCIPAL -->
    <div id="main-menu">
        <button class="btn-brawl" onclick="startMode('lineal')">LINEAL 🐾</button>
        <button class="btn-brawl" onclick="startMode('cuadratica')">CUADRÁTICA 🐱</button>
        <button class="btn-brawl" onclick="startMode('sistema')">SISTEMA 2X2 🐯</button>
    </div>

    <!-- MODO DE CALCULO -->
    <div id="calc-mode" class="section">
        <div class="michi-dialog">
            <div id="michi-img" class="michi-icon">🐱</div>
            <div class="bubble" id="michi-speech">¡Miau! Vamos a resolver esto.</div>
        </div>

        <div id="input-container"></div>
        <button class="btn-brawl" onclick="process()">¡ATAQUE CALCULADO!</button>
        
        <div id="result" class="res-box" style="display:none"></div>
        <canvas id="myChart"></canvas>

        <div id="post-options" style="display:none; margin-top: 15px;">
            <button class="btn-brawl btn-again" onclick="resetInputs()">OTRA ECUACIÓN 🔄</button>
            <button class="btn-brawl btn-back" onclick="goHome()">VOLVER AL MENÚ 🏠</button>
        </div>
    </div>
</div>

<script>
    let currentMode = '';
    let myChart = null;
    const themes = [
        {bg: '#2C3E50', primary: '#FFCC00'}, // Default
        {bg: '#4A235A', primary: '#AF7AC5'}, // Purpura
        {bg: '#145A32', primary: '#52BE80'}, // Verde
        {bg: '#78281F', primary: '#EC7063'}  // Rojo
    ];

    function startMode(mode) {
        currentMode = mode;
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('calc-mode').style.display = 'block';
        document.getElementById('post-options').style.display = 'none';
        document.getElementById('result').style.display = 'none';
        if(myChart) myChart.destroy();

        const container = document.getElementById('input-container');
        const speech = document.getElementById('michi-speech');
        const icon = document.getElementById('michi-img');

        if(mode === 'lineal') {
            icon.innerText = '🐱';
            speech.innerText = "¡Miau! Las lineales son como un hilo recto. ¡Busquemos la X!";
            container.innerHTML = 'a: <input type="number" id="a"> b: <input type="number" id="b">';
        } else if(mode === 'cuadratica') {
            icon.innerText = '🐈';
            speech.innerText = "¡Prrrr! Las cuadráticas tienen una panza curva como un gato gordito.";
            container.innerHTML = 'a: <input type="number" id="a"> b: <input type="number" id="b"> c: <input type="number" id="c">';
        } else {
            icon.innerText = '🦁';
            speech.innerText = "¡Rawr! Buscamos el punto donde dos michis se encuentran.";
            container.innerHTML = 'Eq1: <input type="number" id="a1">x + <input type="number" id="b1">y = <input type="number" id="c1"><br>' +
                                  'Eq2: <input type="number" id="a2">x + <input type="number" id="b2">y = <input type="number" id="c2">';
        }
    }

    function resetInputs() {
        startMode(currentMode);
    }

    function goHome() {
        const theme = themes[Math.floor(Math.random() * themes.length)];
        document.body.style.backgroundColor = theme.bg;
        document.documentElement.style.setProperty('--primary', theme.primary);
        
        document.getElementById('main-menu').style.display = 'block';
        document.getElementById('calc-mode').style.display = 'none';
    }

    function process() {
        const resDiv = document.getElementById('result');
        resDiv.style.display = 'block';
        document.getElementById('post-options').style.display = 'block';
        
        const labels = [], data1 = [], data2 = [];

        if(currentMode === 'lineal') {
            const a = parseFloat(document.getElementById('a').value);
            const b = parseFloat(document.getElementById('b').value);
            const x = -b/a;
            resDiv.innerText = `¡IMPACTO MIAU! x = ${x.toFixed(2)}`;
            for(let i = -10; i <= 10; i++) { labels.push(i); data1.push(a*i+b); }
            draw([ {label: 'Trayectoria Gato', data: data1, borderColor: 'orange'} ]);
        } else if(currentMode === 'cuadratica') {
            const a = parseFloat(document.getElementById('a').value);
            const b = parseFloat(document.getElementById('b').value);
            const c = parseFloat(document.getElementById('c').value);
            const d = b*b - 4*a*c;
            resDiv.innerText = d < 0 ? "¡FALLO! Sin solución real" : `x1=${((-b+Math.sqrt(d))/(2*a)).toFixed(2)}, x2=${((-b-Math.sqrt(d))/(2*a)).toFixed(2)}`;
            for(let i = -10; i <= 10; i++) { labels.push(i); data1.push(a*i*i + b*i + c); }
            draw([ {label: 'Salto Michi', data: data1, borderColor: 'red'} ]);
        } else {
            const a1=parseFloat(document.getElementById('a1').value), b1=parseFloat(document.getElementById('b1').value), c1=parseFloat(document.getElementById('c1').value);
            const a2=parseFloat(document.getElementById('a2').value), b2=parseFloat(document.getElementById('b2').value), c2=parseFloat(document.getElementById('c2').value);
            const det = a1*b2 - a2*b1;
            if(det === 0) return resDiv.innerText = "¡EMPATE! Sin solución única";
            const x = (c1*b2 - c2*b1)/det, y = (a1*c2 - a2*c1)/det;
            resDiv.innerText = `¡LOCALIZADO! x=${x.toFixed(2)}, y=${y.toFixed(2)}`;
            for(let i = -10; i <= 10; i++) { labels.push(i); data1.push((c1-a1*i)/b1); data2.push((c2-a2*i)/b2); }
            draw([ {label: 'Michi 1', data: data1, borderColor: 'cyan'}, {label: 'Michi 2', data: data2, borderColor: 'yellow'} ]);
        }

        function draw(datasets) {
            if(myChart) myChart.destroy();
            myChart = new Chart(document.getElementById('myChart'), {
                type: 'line',
                data: { labels: labels, datasets: datasets },
                options: { responsive: true, scales: { y: { grid: { color: '#444' } } } }
            });
        }
    }
</script>
</body>
</html>
