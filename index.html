<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculadora Mancho</title>
    <!-- Cargamos Chart.js con prioridad -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        :root {
            --brawl-blue: #314357;
            --brawl-yellow: #ffcc00;
            --brawl-card: #3c5064;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--brawl-blue);
            font-family: 'Luckiest Guy', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .brawl-container {
            background: var(--brawl-card);
            border: 5px solid #000;
            border-radius: 30px;
            padding: 25px;
            width: 100%;
            max-width: 420px;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.4);
            text-align: center;
            position: relative;
        }

        h1 {
            color: var(--brawl-yellow);
            text-shadow: 4px 4px 0px #000;
            font-size: 1.8rem;
            margin-bottom: 2px;
        }

        .dev-tag {
            color: #fff;
            font-size: 0.8rem;
            margin-bottom: 20px;
            display: block;
            text-shadow: 2px 2px 0px #000;
        }

        .btn-brawl {
            background: var(--brawl-yellow);
            color: #fff;
            border: 4px solid #000;
            border-radius: 15px;
            padding: 14px;
            margin: 8px 0;
            width: 100%;
            font-family: 'Luckiest Guy', cursive;
            font-size: 1.2rem;
            text-shadow: 3px 3px 0px #000;
            cursor: pointer;
            box-shadow: 0 5px 0px rgba(0,0,0,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-brawl:active { transform: translateY(3px); box-shadow: 0 2px 0px rgba(0,0,0,0.2); }

        .michi-section {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            height: 80px;
        }

        .emoji-click {
            font-size: 50px;
            cursor: pointer;
            transition: transform 0.3s ease;
            z-index: 5;
        }

        .emoji-active { transform: scale(1.4) rotate(10deg); }

        .speech-bubble {
            position: absolute;
            left: 60%;
            top: -10px;
            background: white;
            border: 3px solid #000;
            border-radius: 15px;
            padding: 5px 12px;
            font-size: 0.7rem;
            color: #000;
            animation: float 2s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        #info-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: #ecf0f1;
            border: 6px solid #000;
            border-radius: 25px;
            padding: 25px;
            max-width: 350px;
            text-align: center;
            box-shadow: 10px 10px 0px #000;
        }

        .input-grid { margin: 15px 0; color: white; line-height: 2.2; }
        
        input {
            font-family: 'Luckiest Guy';
            border: 3px solid #000;
            border-radius: 8px;
            padding: 5px;
            width: 60px;
            text-align: center;
            margin: 2px;
            background: #fff;
            color: #000;
        }

        .res-box {
            background: #fff;
            border: 4px solid #000;
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
            color: #000;
            font-size: 1rem;
            min-height: 40px;
        }

        .chart-container {
            width: 100%;
            height: 200px;
            background: white;
            border: 4px solid #000;
            border-radius: 15px;
            margin-top: 10px;
            padding: 5px;
        }
    </style>
</head>
<body>

<div id="info-modal" onclick="closeInfo()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h2 style="color:#2c3e50; margin-bottom:15px;">¡INFO DEL MICHI!</h2>
        <p id="modal-text" style="color:#2c3e50; font-family: sans-serif; font-weight: bold; margin-bottom: 20px;"></p>
        <button class="btn-brawl" style="font-size:1rem; padding:10px;" onclick="closeInfo()">ENTENDIDO</button>
    </div>
</div>

<div class="brawl-container">
    <h1>CALCULADORA MANCHO</h1>
    <span class="dev-tag">ROMÁN SERRANO DURÁN (mancho)</span>

    <div id="home">
        <button class="btn-brawl" onclick="showSub()">LINEAL 🚀</button>
        <button class="btn-brawl" onclick="setup('cuad')">CUADRÁTICA 🐱</button>
        <button class="btn-brawl" onclick="setup('sis2')">SISTEMA 2X2 🐯</button>
        <button class="btn-brawl" onclick="setup('sis3')">SISTEMA 3X3 🦁</button>
    </div>

    <div id="sub-menu" style="display:none;">
        <button class="btn-brawl" onclick="setup('lin-p')">PUNTO-PENDIENTE</button>
        <button class="btn-brawl" onclick="setup('lin-g')">FORMA GENERAL</button>
        <button class="btn-brawl" style="background:#7f8c8d" onclick="goHome()">ATRÁS</button>
    </div>

    <div id="calc-screen" style="display:none;">
        <div class="michi-section">
            <div id="michi-emoji" class="emoji-click" onclick="toggleInfo()">🐱</div>
            <div id="click-bubble" class="speech-bubble">¡HAZ CLIC!</div>
        </div>
        
        <div id="inputs-container" class="input-grid"></div>
        <button class="btn-brawl" onclick="calculate()">RESOLVER</button>
        
        <div id="result-display" class="res-box" style="display:none;"></div>
        
        <div id="graph-wrapper" class="chart-container" style="display:none;">
            <canvas id="myChart"></canvas>
        </div>

        <button class="btn-brawl" style="background:#e74c3c; margin-top:15px;" onclick="goHome()">INICIO</button>
    </div>
</div>

<script>
    let currentMode = '';
    let chartInstance = null;
    const descriptions = {
        'lin-p': "Calcula la recta con punto y pendiente: y - y1 = m(x - x1).",
        'lin-g': "Ecuación general: Ax + By + C = 0.",
        'cuad': "Ecuación de 2do grado: ax² + bx + c = 0.",
        'sis2': "Sistema 2x2: Encuentra donde se cruzan dos líneas.",
        'sis3': "Sistema 3x3: Resuelto por Método de Cramer (Determinantes)."
    };

    function showSub() {
        document.getElementById('home').style.display = 'none';
        document.getElementById('sub-menu').style.display = 'block';
    }

    function goHome() {
        document.getElementById('home').style.display = 'block';
        document.getElementById('sub-menu').style.display = 'none';
        document.getElementById('calc-screen').style.display = 'none';
        if(chartInstance) { chartInstance.destroy(); chartInstance = null; }
    }

    function toggleInfo() {
        document.getElementById('michi-emoji').classList.add('emoji-active');
        document.getElementById('click-bubble').style.display = 'none';
        setTimeout(() => {
            document.getElementById('modal-text').innerText = descriptions[currentMode];
            document.getElementById('info-modal').style.display = 'flex';
        }, 150);
    }

    function closeInfo() {
        document.getElementById('info-modal').style.display = 'none';
        document.getElementById('michi-emoji').classList.remove('emoji-active');
    }

    function setup(mode) {
        currentMode = mode;
        document.getElementById('home').style.display = 'none';
        document.getElementById('sub-menu').style.display = 'none';
        document.getElementById('calc-screen').style.display = 'block';
        document.getElementById('result-display').style.display = 'none';
        document.getElementById('graph-wrapper').style.display = 'none';
        document.getElementById('click-bubble').style.display = 'block';
        
        const container = document.getElementById('inputs-container');
        if(mode === 'lin-p') container.innerHTML = 'm: <input id="n1"> x1: <input id="n2"> y1: <input id="n3">';
        else if(mode === 'lin-g') container.innerHTML = 'A: <input id="n1"> B: <input id="n2"> C: <input id="n3">';
        else if(mode === 'cuad') container.innerHTML = 'a: <input id="n1"> b: <input id="n2"> c: <input id="n3">';
        else if(mode === 'sis2') container.innerHTML = 'L1: <input id="n1">x+<input id="n2">y=<input id="n3"><br>L2: <input id="n4">x+<input id="n5">y=<input id="n6">';
        else if(mode === 'sis3') container.innerHTML = 'E1: <input id="n1">x+<input id="n2">y+<input id="n3">z=<input id="n4"><br>E2: <input id="n5">x+<input id="n6">y+<input id="n7">z=<input id="n8"><br>E3: <input id="n9">x+<input id="n10">y+<input id="n11">z=<input id="n12">';
    }

    function calculate() {
        const resDiv = document.getElementById('result-display');
        const graphDiv = document.getElementById('graph-wrapper');
        resDiv.style.display = 'block';
        
        const val = (id) => {
            const v = parseFloat(document.getElementById(id).value);
            return isNaN(v) ? 0 : v;
        };

        let labels = Array.from({length: 21}, (_, i) => i - 10);
        let dataPoints = [];
        let showGraph = false;

        if(currentMode === 'lin-p') {
            const m = val('n1'), x1 = val('n2'), y1 = val('n3');
            const b = y1 - (m * x1);
            resDiv.innerHTML = `Ecuación: y = ${m}x + (${b.toFixed(2)})`;
            dataPoints = labels.map(x => m*x + b);
            showGraph = true;
        } else if(currentMode === 'lin-g') {
            const A = val('n1'), B = val('n2'), C = val('n3');
            if(B === 0) resDiv.innerHTML = `Línea Vertical: x = ${(-C/A).toFixed(2)}`;
            else {
                const m = -A/B; const b = -C/B;
                resDiv.innerHTML = `y = ${m.toFixed(2)}x + (${b.toFixed(2)})`;
                dataPoints = labels.map(x => m*x + b);
                showGraph = true;
            }
        } else if(currentMode === 'cuad') {
            const a = val('n1'), b = val('n2'), c = val('n3');
            const disc = b*b - 4*a*c;
            if(a === 0) resDiv.innerHTML = "No es cuadrática (a=0)";
            else if(disc < 0) resDiv.innerHTML = "Raíces Imaginarias";
            else resDiv.innerHTML = `x1: ${((-b+Math.sqrt(disc))/(2*a)).toFixed(2)} | x2: ${((-b-Math.sqrt(disc))/(2*a)).toFixed(2)}`;
            dataPoints = labels.map(x => a*x*x + b*x + c);
            showGraph = true;
        } else if(currentMode === 'sis2') {
            const a=val('n1'), b=val('n2'), c=val('n3'), d=val('n4'), e=val('n5'), f=val('n6');
            const det = a*e - b*d;
            if(det === 0) resDiv.innerHTML = "Sin solución única";
            else resDiv.innerHTML = `X: ${((c*e-b*f)/det).toFixed(2)} | Y: ${((a*f-c*d)/det).toFixed(2)}`;
        } else if(currentMode === 'sis3') {
            const a1=val('n1'), b1=val('n2'), c1=val('n3'), d1=val('n4');
            const a2=val('n5'), b2=val('n6'), c2=val('n7'), d2=val('n8');
            const a3=val('n9'), b3=val('n10'), c3=val('n11'), d3=val('n12');
            const det = a1*(b2*c3-b3*c2) - b1*(a2*c3-a3*c2) + c1*(a2*b3-a3*b2);
            if(det === 0) resDiv.innerHTML = "Determinante 0";
            else {
                const dx = d1*(b2*c3-b3*c2)-b1*(d2*c3-d3*c2)+c1*(d2*b3-d3*b2);
                const dy = a1*(d2*c3-d3*c2)-d1*(a2*c3-a3*c2)+c1*(a2*d3-a3*d2);
                const dz = a1*(b2*d3-b3*d2)-b1*(a2*d3-a3*d2)+d1*(a2*b3-a3*b2);
                resDiv.innerHTML = `X=${(dx/det).toFixed(2)} | Y=${(dy/det).toFixed(2)} | Z=${(dz/det).toFixed(2)}`;
            }
        }

        if(showGraph) {
            graphDiv.style.display = 'block';
            if(chartInstance) chartInstance.destroy();
            const ctx = document.getElementById('myChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Gráfica f(x)',
                        data: dataPoints,
                        borderColor: '#ffcc00',
                        borderWidth: 3,
                        fill: false,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: false } }
                }
            });
        } else {
            graphDiv.style.display = 'none';
        }
    }
</script>
</body>
</html>
