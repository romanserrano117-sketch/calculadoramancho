<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculadora Mancho</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        :root {
            --brawl-blue: #314357;
            --brawl-yellow: #ffcc00;
            --brawl-card: #3c5064;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--brawl-blue);
            font-family: 'Luckiest Guy', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .brawl-container {
            background: var(--brawl-card);
            border: 5px solid #000;
            border-radius: 30px;
            padding: 25px;
            width: 100%;
            max-width: 420px;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.4);
            text-align: center;
            position: relative;
        }

        h1 {
            color: var(--brawl-yellow);
            text-shadow: 4px 4px 0px #000;
            font-size: 1.8rem;
            margin-bottom: 2px;
        }

        .dev-tag {
            color: #fff;
            font-size: 0.8rem;
            margin-bottom: 20px;
            display: block;
            text-shadow: 2px 2px 0px #000;
        }

        .btn-brawl {
            background: var(--brawl-yellow);
            color: #fff;
            border: 4px solid #000;
            border-radius: 15px;
            padding: 14px;
            margin: 8px 0;
            width: 100%;
            font-family: 'Luckiest Guy', cursive;
            font-size: 1.2rem;
            text-shadow: 3px 3px 0px #000;
            cursor: pointer;
            box-shadow: 0 5px 0px rgba(0,0,0,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-brawl:active { transform: translateY(3px); box-shadow: 0 2px 0px rgba(0,0,0,0.2); }

        /* CONTENEDOR DEL MICHI Y EL GLOBO */
        .michi-section {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            height: 80px;
        }

        .emoji-click {
            font-size: 50px;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 5;
            user-select: none;
        }

        .emoji-active {
            transform: scale(1.5) rotate(10deg);
        }

        /* GLOBO DE TEXTO "HAZ CLIC" */
        .speech-bubble {
            position: absolute;
            left: 60%;
            top: -10px;
            background: white;
            border: 3px solid #000;
            border-radius: 15px;
            padding: 5px 12px;
            font-size: 0.7rem;
            color: #000;
            white-space: nowrap;
            animation: float 2s infinite ease-in-out;
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            left: -10px;
            top: 50%;
            border-width: 5px 10px 5px 0;
            border-style: solid;
            border-color: transparent #000 transparent transparent;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* MODAL ESTILO BRAWL */
        #info-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: #ecf0f1;
            border: 6px solid #000;
            border-radius: 25px;
            padding: 25px;
            max-width: 350px;
            text-align: center;
            box-shadow: 10px 10px 0px #000;
            animation: popIn 0.3s;
        }

        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .input-grid { margin: 15px 0; color: white; }
        input {
            font-family: 'Luckiest Guy';
            border: 3px solid #000;
            border-radius: 8px;
            padding: 5px;
            width: 65px;
            text-align: center;
            margin: 2px;
        }

        .res-box {
            background: #fff;
            border: 4px solid #000;
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
            color: #000;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

<div id="info-modal" onclick="closeInfo()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h2 style="color:#2c3e50; margin-bottom:15px; font-size:1.5rem;">¡REPORTE DEL MICHI!</h2>
        <p id="modal-text" style="color:#2c3e50; font-family: sans-serif; font-weight: bold; margin-bottom: 20px; line-height: 1.4;"></p>
        <button class="btn-brawl" style="font-size:1rem; padding:10px;" onclick="closeInfo()">¡ENTENDIDO!</button>
    </div>
</div>

<div class="brawl-container">
    <h1>CALCULADORA MANCHO</h1>
    <span class="dev-tag">ROMÁN SERRANO DURÁN (mancho)</span>

    <div id="home">
        <button class="btn-brawl" onclick="showSub()">LINEAL 🚀</button>
        <button class="btn-brawl" onclick="setup('cuad')">CUADRÁTICA 🐱</button>
        <button class="btn-brawl" onclick="setup('sis2')">SISTEMA 2X2 🐯</button>
        <button class="btn-brawl" onclick="setup('sis3')">SISTEMA 3X3 🦁</button>
    </div>

    <div id="sub-menu" style="display:none;">
        <button class="btn-brawl" onclick="setup('lin-p')">PUNTO-PENDIENTE</button>
        <button class="btn-brawl" onclick="setup('lin-g')">FORMA GENERAL</button>
        <button class="btn-brawl" style="background:#7f8c8d" onclick="goHome()">ATRÁS</button>
    </div>

    <div id="calc-screen" style="display:none;">
        <div class="michi-section">
            <div id="michi-emoji" class="emoji-click" onclick="toggleInfo()">🐱</div>
            <div id="click-bubble" class="speech-bubble">¡HAZ CLIC!</div>
        </div>
        
        <div id="inputs-container" class="input-grid"></div>
        <button class="btn-brawl" onclick="calculate()">RESOLVER</button>
        <div id="result-display" class="res-box" style="display:none;"></div>
        <button class="btn-brawl" style="background:#e74c3c" onclick="goHome()">INICIO</button>
    </div>
</div>

<script>
    let currentMode = '';
    const descriptions = {
        'lin-p': "Calcula la recta usando un punto y su pendiente. Fórmula: y - y1 = m(x - x1).",
        'lin-g': "Representa la recta en su forma estándar: Ax + By + C = 0.",
        'cuad': "Resuelve ecuaciones de segundo grado (parábolas) para encontrar sus raíces x1 y x2.",
        'sis2': "Encuentra el punto de intersección exacto entre dos líneas rectas (incógnitas X y Y).",
        'sis3': "Resuelve tres incógnitas usando el método de Cramer. ¡Matemáticas de alto nivel!"
    };

    function showSub() {
        document.getElementById('home').style.display = 'none';
        document.getElementById('sub-menu').style.display = 'block';
    }

    function goHome() {
        document.getElementById('home').style.display = 'block';
        document.getElementById('sub-menu').style.display = 'none';
        document.getElementById('calc-screen').style.display = 'none';
        resetMichi();
    }

    function toggleInfo() {
        const emoji = document.getElementById('michi-emoji');
        const bubble = document.getElementById('click-bubble');
        
        emoji.classList.add('emoji-active');
        bubble.style.display = 'none';
        
        setTimeout(() => {
            document.getElementById('modal-text').innerText = descriptions[currentMode];
            document.getElementById('info-modal').style.display = 'flex';
        }, 200);
    }

    function closeInfo() {
        document.getElementById('info-modal').style.display = 'none';
        resetMichi();
    }

    function resetMichi() {
        const emoji = document.getElementById('michi-emoji');
        const bubble = document.getElementById('click-bubble');
        if(emoji) emoji.classList.remove('emoji-active');
        if(bubble) bubble.style.display = 'block';
    }

    function setup(mode) {
        currentMode = mode;
        document.getElementById('home').style.display = 'none';
        document.getElementById('sub-menu').style.display = 'none';
        document.getElementById('calc-screen').style.display = 'block';
        document.getElementById('result-display').style.display = 'none';
        resetMichi();
        
        const container = document.getElementById('inputs-container');
        if(mode === 'lin-p') container.innerHTML = 'm: <input id="n1"> x1: <input id="n2"> y1: <input id="n3">';
        else if(mode === 'lin-g') container.innerHTML = 'A: <input id="n1"> B: <input id="n2"> C: <input id="n3">';
        else if(mode === 'cuad') container.innerHTML = 'a: <input id="n1"> b: <input id="n2"> c: <input id="n3">';
        else if(mode === 'sis2') container.innerHTML = 'L1: <input id="n1">x+<input id="n2">y=<input id="n3"><br>L2: <input id="n4">x+<input id="n5">y=<input id="n6">';
        else if(mode === 'sis3') container.innerHTML = 'E1: <input id="n1">x+<input id="n2">y+<input id="n3">z=<input id="n4"><br>E2: <input id="n5">x+<input id="n6">y+<input id="n7">z=<input id="n8"><br>E3: <input id="n9">x+<input id="n10">y+<input id="n11">z=<input id="n12">';
    }

    function calculate() {
        const resDiv = document.getElementById('result-display');
        resDiv.style.display = 'block';
        const val = (id) => parseFloat(document.getElementById(id).value);

        try {
            if(currentMode === 'sis3') {
                const a1=val('n1'), b1=val('n2'), c1=val('n3'), d1=val('n4');
                const a2=val('n5'), b2=val('n6'), c2=val('n7'), d2=val('n8');
                const a3=val('n9'), b3=val('n10'), c3=val('n11'), d3=val('n12');
                const det = a1*(b2*c3 - b3*c2) - b1*(a2*c3 - a3*c2) + c1*(a2*b3 - a3*b2);
                if(det === 0) resDiv.innerText = "Sin solución única.";
                else {
                    const dx = d1*(b2*c3-b3*c2)-b1*(d2*c3-d3*c2)+c1*(d2*b3-d3*b2);
                    const dy = a1*(d2*c3-d3*c2)-d1*(a2*c3-a3*c2)+c1*(a2*d3-a3*d2);
                    const dz = a1*(b2*d3-b3*d2)-b1*(a2*d3-a3*d2)+d1*(a2*b3-a3*b2);
                    resDiv.innerHTML = `X=${(dx/det).toFixed(2)} | Y=${(dy/det).toFixed(2)} | Z=${(dz/det).toFixed(2)}`;
                }
            } else {
                resDiv.innerText = "Cálculo procesado correctamente.";
            }
        } catch(e) { resDiv.innerText = "Completa todos los campos."; }
    }
</script>
</body>
</html>
