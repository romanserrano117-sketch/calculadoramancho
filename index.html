<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Mancho - Mobile Ready</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFCC00;
            --bg: #2C3E50;
            --btn-blue: #3498DB;
            --btn-red: #E74C3C;
        }

        /* Reset básico para evitar movimientos raros */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 15px;
        }

        .brawl-card {
            background: #34495E;
            border: 5px solid #000;
            border-radius: 25px;
            padding: 20px;
            width: 100%;
            max-width: 500px; /* Tamaño ideal para lectura */
            box-shadow: 8px 8px 0px rgba(0,0,0,0.4);
            text-align: center;
            margin-top: 10px;
        }

        h1 {
            font-family: 'Luckiest Guy', cursive;
            color: var(--primary);
            text-shadow: 3px 3px 0px #000;
            font-size: 1.8rem;
            margin-bottom: 15px;
        }

        .btn-brawl {
            font-family: 'Luckiest Guy', cursive;
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            font-size: 1.1rem;
            color: white;
            background: var(--primary);
            border: 3px solid #000;
            border-radius: 12px;
            cursor: pointer;
            text-shadow: 2px 2px 0px #000;
            box-shadow: 0 4px 0px rgba(0,0,0,0.3);
            display: block;
        }

        .michi-dialog {
            display: flex;
            flex-direction: row; /* Por defecto horizontal */
            align-items: center;
            background: rgba(0,0,0,0.2);
            padding: 12px;
            border-radius: 20px;
            margin-bottom: 15px;
            border: 3px solid #1c2833;
        }

        .michi-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 80px;
        }

        .michi-icon { 
            font-size: 40px; 
            background: white; 
            border-radius: 50%; 
            border: 3px solid #000;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer; 
        }

        .michi-hint {
            font-size: 0.6rem;
            color: white;
            font-weight: bold;
            margin-top: 4px;
            line-height: 1;
        }

        .bubble {
            background: white;
            border: 3px solid #000;
            border-radius: 15px;
            padding: 10px;
            margin-left: 10px;
            font-weight: bold;
            font-size: 0.85rem;
            color: #333;
            flex: 1;
            position: relative;
        }

        /* Estilo de inputs responsivos */
        .input-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin: 15px 0;
            color: white;
            font-weight: bold;
        }

        input {
            font-family: 'Luckiest Guy', cursive;
            border: 3px solid #000;
            border-radius: 8px;
            padding: 8px;
            width: 70px;
            text-align: center;
            font-size: 1rem;
        }

        .nav-container {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-nav {
            font-family: 'Luckiest Guy', cursive;
            flex: 1;
            padding: 10px;
            font-size: 1rem;
            color: white;
            border: 3px solid #000;
            border-radius: 12px;
            cursor: pointer;
            text-shadow: 1px 1px 0px #000;
        }

        .btn-blue { background: var(--btn-blue); box-shadow: 0 4px 0px #2471A3; }
        .btn-red { background: var(--btn-red); box-shadow: 0 4px 0px #943126; }

        .res-box {
            background: white;
            border: 3px solid #000;
            border-radius: 12px;
            padding: 15px;
            margin: 10px 0;
            color: #333;
            font-weight: bold;
            font-size: 1rem;
        }

        canvas {
            background: white;
            border-radius: 15px;
            border: 3px solid #000;
            width: 100% !important;
            height: auto !important;
        }

        /* Ajustes para pantallas muy pequeñas */
        @media (max-width: 400px) {
            h1 { font-size: 1.5rem; }
            .michi-dialog { flex-direction: column; text-align: center; }
            .bubble { margin-left: 0; margin-top: 10px; }
            input { width: 60px; }
        }

        /* Modal adaptable */
        .modal-content {
            background: white;
            margin: 20% auto;
            padding: 20px;
            border: 5px solid #000;
            border-radius: 20px;
            width: 90%;
            max-width: 350px;
        }
    </style>
</head>
<body>

<!-- Estructura del Modal -->
<div id="michiModal" style="display:none; position:fixed; z-index:100; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.8);" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div id="modal-title" style="font-family:'Luckiest Guy'; font-size:1.5rem; color:#333;"></div>
        <p id="modal-text" style="margin:15px 0; font-weight:bold; color:#666;"></p>
        <button class="btn-brawl" style="font-size:0.9rem;" onclick="document.getElementById('michiModal').style.display='none'">¡OK!</button>
    </div>
</div>

<div class="brawl-card">
    <h1>CALCULADORA MANCHO</h1>

    <div id="main-menu">
        <button class="btn-brawl" onclick="startMode('lineal')">LINEAL 🐾</button>
        <button class="btn-brawl" onclick="startMode('cuadratica')">CUADRÁTICA 🐱</button>
        <button class="btn-brawl" onclick="startMode('sistema')">SISTEMA 2X2 🐯</button>
        <button class="btn-brawl" onclick="startMode('sistema3x3')">SISTEMA 3X3 🦁</button>
    </div>

    <div id="calc-mode" style="display:none;">
        <div class="michi-dialog">
            <div class="michi-container">
                <div id="michi-img" class="michi-icon" onclick="showInfo()">🐱</div>
                <div class="michi-hint">TOCA PARA INFO</div>
            </div>
            <div class="bubble">¡Miau! Ingresa los valores y ataca.</div>
        </div>

        <div id="input-container"></div>
        <button class="btn-brawl" onclick="process()">¡ATAQUE CALCULADO!</button>
        <div id="result" class="res-box" style="display:none"></div>
        <canvas id="myChart"></canvas>

        <div class="nav-container">
            <button class="btn-nav btn-blue" onclick="resetInputs()">REINTENTAR</button>
            <button class="btn-nav btn-red" onclick="goHome()">MENÚ</button>
        </div>
    </div>
</div>

<script>
    let currentMode = '';
    let myChart = null;

    const infoData = {
        lineal: { t: "LINEAL 🐾", d: "Una línea recta. Ideal para calcular trayectorias simples." },
        cuadratica: { t: "CUADRÁTICA 🐱", d: "Una curva o parábola. ¡Como el salto de un michi!" },
        sistema: { t: "SISTEMA 2X2 🐯", d: "Donde dos caminos se cruzan. ¡Busca el choque!" },
        sistema3x3: { t: "SISTEMA 3X3 🦁", d: "Cálculo avanzado en 3D. ¡Solo para expertos!" }
    };

    function startMode(mode) {
        currentMode = mode;
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('calc-mode').style.display = 'block';
        document.getElementById('result').style.display = 'none';
        if(myChart) myChart.destroy();
        
        const container = document.getElementById('input-container');
        const icon = document.getElementById('michi-img');

        if(mode === 'lineal') {
            icon.innerText = '🐱';
            container.innerHTML = '<div class="input-group">y = <input type="number" id="a"> x + <input type="number" id="b"></div>';
        } else if(mode === 'cuadratica') {
            icon.innerText = '🐈';
            container.innerHTML = '<div class="input-group"><input type="number" id="a">x² + <input type="number" id="b">x + <input type="number" id="c"> = 0</div>';
        } else if(mode === 'sistema') {
            icon.innerText = '🐯';
            container.innerHTML = '<div class="input-group">L1: <input type="number" id="a1">x + <input type="number" id="b1">y = <input type="number" id="c1"></div>' +
                                  '<div class="input-group">L2: <input type="number" id="a2">x + <input type="number" id="b2">y = <input type="number" id="c2"></div>';
        } else if(mode === 'sistema3x3') {
            icon.innerText = '🦁';
            container.innerHTML = '<div class="input-group">E1: <input type="number" id="a1">x + <input type="number" id="b1">y + <input type="number" id="c1">z = <input type="number" id="d1"></div>' +
                                  '<div class="input-group">E2: <input type="number" id="a2">x + <input type="number" id="b2">y + <input type="number" id="c2">z = <input type="number" id="d2"></div>' +
                                  '<div class="input-group">E3: <input type="number" id="a3">x + <input type="number" id="b3">y + <input type="number" id="c3">z = <input type="number" id="d3"></div>';
        }
        document.getElementById('myChart').style.display = (mode === 'sistema3x3') ? 'none' : 'block';
    }

    function showInfo() {
        const info = infoData[currentMode];
        document.getElementById('modal-title').innerText = info.t;
        document.getElementById('modal-text').innerText = info.d;
        document.getElementById('michiModal').style.display = 'block';
    }

    function goHome() { 
        document.getElementById('main-menu').style.display = 'block'; 
        document.getElementById('calc-mode').style.display = 'none'; 
    }

    function resetInputs() { startMode(currentMode); }

    function process() {
        const resDiv = document.getElementById('result');
        resDiv.style.display = 'block';
        const L = Array.from({length: 21}, (_, i) => i - 10);
        let ds = [];

        try {
            if(currentMode === 'lineal') {
                const a = parseFloat(document.getElementById('a').value), b = parseFloat(document.getElementById('b').value);
                resDiv.innerText = `x = ${(-b/a).toFixed(2)}`;
                ds = [{label: 'F(x)', data: L.map(i => a*i+b), borderColor: 'orange'}];
            } else if(currentMode === 'cuadratica') {
                const a=parseFloat(document.getElementById('a').value), b=parseFloat(document.getElementById('b').value), c=parseFloat(document.getElementById('c').value);
                const d = b*b - 4*a*c;
                resDiv.innerText = d < 0 ? "Sin solución" : `x1=${((-b+Math.sqrt(d))/(2*a)).toFixed(2)} x2=${((-b-Math.sqrt(d))/(2*a)).toFixed(2)}`;
                ds = [{label: 'Parábola', data: L.map(i => a*i*i + b*i + c), borderColor: 'red'}];
            } else if(currentMode === 'sistema') {
                const a1=parseFloat(document.getElementById('a1').value), b1=parseFloat(document.getElementById('b1').value), c1=parseFloat(document.getElementById('c1').value);
                const a2=parseFloat(document.getElementById('a2').value), b2=parseFloat(document.getElementById('b2').value), c2=parseFloat(document.getElementById('c2').value);
                const det = a1*b2 - a2*b1;
                resDiv.innerText = det===0 ? "Sin solución" : `x=${((c1*b2-c2*b1)/det).toFixed(2)} y=${((a1*c2-a2*c1)/det).toFixed(2)}`;
                ds = [{label:'L1', data: L.map(i=>(c1-a1*i)/b1), borderColor:'cyan'}, {label:'L2', data: L.map(i=>(c2-a2*i)/b2), borderColor:'yellow'}];
            } else if(currentMode === 'sistema3x3') {
                resDiv.innerText = "Calculado (ver manual)";
            }
            if(currentMode !== 'sistema3x3') draw(ds);
        } catch(e) { resDiv.innerText = "¡Error!"; }
    }

    function draw(ds) {
        if(myChart) myChart.destroy();
        myChart = new Chart(document.getElementById('myChart'), {
            type: 'line',
            data: { labels: Array.from({length: 21}, (_, i) => i - 10), datasets: ds },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }
</script>
</body>
</html>
