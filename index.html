<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Mancho - Meow Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFCC00;
            --bg: #2C3E50;
            --btn-blue: #3498DB;
            --btn-red: #E74C3C;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .brawl-card {
            background: #34495E;
            border: 6px solid #000;
            border-radius: 25px;
            padding: 25px;
            width: 100%;
            max-width: 650px;
            box-shadow: 12px 12px 0px rgba(0,0,0,0.4);
            text-align: center;
        }

        h1 {
            font-family: 'Luckiest Guy', cursive;
            color: var(--primary);
            text-shadow: 4px 4px 0px #000;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .btn-brawl {
            font-family: 'Luckiest Guy', cursive;
            width: 95%;
            padding: 15px;
            margin: 10px auto;
            font-size: 1.4rem;
            color: white;
            background: var(--primary);
            border: 4px solid #000;
            border-radius: 15px;
            cursor: pointer;
            text-shadow: 2px 2px 0px #000;
            box-shadow: 0 6px 0px rgba(0,0,0,0.3);
            display: block;
        }

        /* Estilos de Navegación según image_82f9d6.png */
        .nav-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .btn-nav {
            font-family: 'Luckiest Guy', cursive;
            flex: 1;
            padding: 12px;
            font-size: 1.2rem;
            color: white;
            border: 4px solid #000;
            border-radius: 15px;
            cursor: pointer;
            text-shadow: 2px 2px 0px #000;
            box-shadow: 0 5px 0px rgba(0,0,0,0.3);
        }

        .btn-blue { background: var(--btn-blue); }
        .btn-red { background: var(--btn-red); }

        /* Diálogo e Icono */
        .michi-dialog {
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 30px;
            margin-bottom: 20px;
            border: 4px solid #1c2833;
        }

        .michi-icon { 
            font-size: 50px; 
            background: white; 
            border-radius: 50%; 
            padding: 5px; 
            border: 4px solid #000;
            min-width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer; /* Indica que es clicable */
            transition: transform 0.2s;
        }

        .michi-icon:hover { transform: scale(1.1); }

        .bubble {
            background: white;
            border: 4px solid #000;
            border-radius: 20px;
            padding: 15px;
            margin-left: 20px;
            font-weight: bold;
            color: #333;
            flex: 1;
        }

        /* Modal / Ventana Emergente */
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
        }

        .modal-content {
            background-color: #fefefe;
            margin: 15% auto;
            padding: 20px;
            border: 5px solid var(--primary);
            border-radius: 20px;
            width: 70%;
            max-width: 400px;
            text-align: center;
            font-family: 'Arial', sans-serif;
            box-shadow: 0px 0px 20px var(--primary);
        }

        .modal-title { font-family: 'Luckiest Guy', cursive; color: #333; font-size: 1.5rem; margin-bottom: 10px; }

        .section { display: none; }
        .input-group { margin: 15px 0; color: white; font-weight: bold; }
        input { font-family: 'Luckiest Guy', cursive; border: 3px solid #000; border-radius: 10px; padding: 8px; width: 65px; margin: 0 5px; text-align: center; }
        .res-box { background: white; border: 4px solid #000; border-radius: 15px; padding: 20px; margin: 15px 0; color: #333; font-weight: bold; min-height: 50px; white-space: pre-line; }
        canvas { background: white; border-radius: 20px; border: 4px solid #000; margin-top: 15px; }
    </style>
</head>
<body>

<!-- Ventana Emergente (Modal) -->
<div id="michiModal" class="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div id="modal-title" class="modal-title">INFO GATUNA</div>
        <p id="modal-text"></p>
        <button class="btn-brawl" style="font-size: 1rem; padding: 10px;" onclick="closeModal()">¡ENTENDIDO!</button>
    </div>
</div>

<div class="brawl-card">
    <h1>CALCULADORA MANCHO</h1>

    <div id="main-menu">
        <button class="btn-brawl" onclick="startMode('lineal')">LINEAL 🐾</button>
        <button class="btn-brawl" onclick="startMode('cuadratica')">CUADRÁTICA 🐱</button>
        <button class="btn-brawl" onclick="startMode('sistema')">SISTEMA 2X2 🐯</button>
        <button class="btn-brawl" onclick="startMode('sistema3x3')">SISTEMA 3X3 🦁</button>
    </div>

    <div id="calc-mode" class="section">
        <div class="michi-dialog">
            <!-- El clic aquí activa la descripción -->
            <div id="michi-img" class="michi-icon" onclick="showInfo()">🐱</div>
            <div class="bubble" id="michi-speech">¡Miau!</div>
        </div>

        <div id="input-container"></div>
        <button class="btn-brawl" onclick="process()">¡ATAQUE CALCULADO!</button>
        <div id="result" class="res-box" style="display:none"></div>
        <canvas id="myChart"></canvas>

        <div class="nav-container">
            <button class="btn-nav btn-blue" onclick="resetInputs()">REINTENTAR 🔄</button>
            <button class="btn-nav btn-red" onclick="goHome()">MENÚ 🏠</button>
        </div>
    </div>
</div>

<script>
    let currentMode = '';
    let myChart = null;

    // Descripciones de las ecuaciones
    const infoEcuaciones = {
        lineal: {
            titulo: "ECUACIÓN LINEAL",
            desc: "Es una línea recta. Representa un cambio constante, como un gato caminando a la misma velocidad. ¡Solo buscamos dónde cruza el suelo!"
        },
        cuadratica: {
            titulo: "ECUACIÓN CUADRÁTICA",
            desc: "Forma una parábola (una curva). Es como el salto de un michi. Puede tener dos soluciones, una o ninguna si el gato nunca toca el suelo."
        },
        sistema: {
            titulo: "SISTEMA 2X2",
            desc: "Dos líneas que se cruzan. El resultado es el punto exacto donde dos gatos se encuentran para jugar."
        },
        sistema3x3: {
            titulo: "SISTEMA 3X3",
            desc: "Tres ecuaciones con tres incógnitas. Es como un rompecabezas en 3D. ¡Necesitamos mucha energía para resolver este nivel!"
        }
    };

    function startMode(mode) {
        currentMode = mode;
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('calc-mode').style.display = 'block';
        document.getElementById('result').style.display = 'none';
        if(myChart) myChart.destroy();
        document.getElementById('myChart').style.display = (mode === 'sistema3x3') ? 'none' : 'block';

        const container = document.getElementById('input-container');
        const speech = document.getElementById('michi-speech');
        const icon = document.getElementById('michi-img');

        if(mode === 'lineal') {
            icon.innerText = '🐱';
            speech.innerText = "¡Haz clic en mí para saber más!";
            container.innerHTML = '<div class="input-group">y = <input type="number" id="a" placeholder="A"> x + <input type="number" id="b" placeholder="B"></div>';
        } else if(mode === 'cuadratica') {
            icon.innerText = '🐈';
            speech.innerText = "¡Haz clic en mí para saber más!";
            container.innerHTML = '<div class="input-group"><input type="number" id="a">x² + <input type="number" id="b">x + <input type="number" id="c"> = 0</div>';
        } else if(mode === 'sistema') {
            icon.innerText = '🐯';
            speech.innerText = "¡Haz clic en mí para saber más!";
            container.innerHTML = '<div class="input-group">L1: <input type="number" id="a1">x + <input type="number" id="b1">y = <input type="number" id="c1"></div>' +
                                  '<div class="input-group">L2: <input type="number" id="a2">x + <input type="number" id="b2">y = <input type="number" id="c2"></div>';
        } else if(mode === 'sistema3x3') {
            icon.innerText = '🦁';
            speech.innerText = "¡Haz clic en mí para saber más!";
            container.innerHTML = 
                '<div class="input-group">E1: <input type="number" id="a1">x + <input type="number" id="b1">y + <input type="number" id="c1">z = <input type="number" id="d1"></div>' +
                '<div class="input-group">E2: <input type="number" id="a2">x + <input type="number" id="b2">y + <input type="number" id="c2">z = <input type="number" id="d2"></div>' +
                '<div class="input-group">E3: <input type="number" id="a3">x + <input type="number" id="b3">y + <input type="number" id="c3">z = <input type="number" id="d3"></div>';
        }
    }

    // Funciones del Modal
    function showInfo() {
        const info = infoEcuaciones[currentMode];
        document.getElementById('modal-title').innerText = info.titulo;
        document.getElementById('modal-text').innerText = info.desc;
        document.getElementById('michiModal').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('michiModal').style.display = 'none';
    }

    function resetInputs() { startMode(currentMode); }
    function goHome() { 
        document.getElementById('main-menu').style.display = 'block'; 
        document.getElementById('calc-mode').style.display = 'none'; 
    }

    // Lógica de cálculo (omitiendo por brevedad, se mantiene igual a la anterior)
    function process() {
        const resDiv = document.getElementById('result');
        resDiv.style.display = 'block';
        // ... (Aquí va la lógica de cálculo que ya tienes)
    }
</script>
</body>
</html>
