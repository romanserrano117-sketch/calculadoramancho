<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculadora Mancho</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        :root {
            --brawl-blue: #314357;
            --brawl-yellow: #ffcc00;
            --brawl-card: #3c5064;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: var(--brawl-blue);
            font-family: 'Luckiest Guy', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .brawl-container {
            background: var(--brawl-card);
            border: 5px solid #000;
            border-radius: 30px;
            padding: 25px;
            width: 100%;
            max-width: 420px;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.4);
            text-align: center;
            position: relative;
        }

        h1 {
            color: var(--brawl-yellow);
            text-shadow: 4px 4px 0px #000;
            font-size: 1.8rem;
            margin-bottom: 2px;
        }

        .dev-tag {
            color: #fff;
            font-size: 0.8rem;
            margin-bottom: 20px;
            display: block;
            text-shadow: 2px 2px 0px #000;
        }

        .btn-brawl {
            background: var(--brawl-yellow);
            color: #fff;
            border: 4px solid #000;
            border-radius: 15px;
            padding: 14px;
            margin: 8px 0;
            width: 100%;
            font-family: 'Luckiest Guy', cursive;
            font-size: 1.2rem;
            text-shadow: 3px 3px 0px #000;
            cursor: pointer;
            box-shadow: 0 5px 0px rgba(0,0,0,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-brawl:active { transform: translateY(3px); box-shadow: 0 2px 0px rgba(0,0,0,0.2); }

        .michi-box {
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 20px;
            margin-bottom: 15px;
            border: 3px solid #000;
        }

        .emoji-click {
            font-size: 40px;
            cursor: pointer;
            transition: transform 0.2s;
            user-select: none;
        }

        .emoji-click:hover { transform: scale(1.1); }

        .bubble {
            background: white;
            border: 3px solid #000;
            border-radius: 12px;
            padding: 8px;
            margin-left: 10px;
            font-size: 0.8rem;
            color: #000;
            flex: 1;
        }

        .input-grid { margin: 15px 0; color: white; line-height: 2;}
        
        input {
            font-family: 'Luckiest Guy';
            border: 3px solid #000;
            border-radius: 8px;
            padding: 5px;
            width: 65px;
            text-align: center;
            margin: 2px;
        }

        .res-box {
            background: #fff;
            border: 3px solid #000;
            border-radius: 12px;
            padding: 15px;
            margin: 15px 0;
            color: #000;
            font-size: 1.1rem;
            min-height: 50px;
        }
    </style>
</head>
<body>

<div class="brawl-container">
    <h1>CALCULADORA MANCHO</h1>
    <span class="dev-tag">ROMÁN SERRANO DURÁN (mancho)</span>

    <div id="home">
        <button class="btn-brawl" onclick="showSub()">LINEAL 🚀</button>
        <button class="btn-brawl" onclick="setup('cuad')">CUADRÁTICA 🐱</button>
        <button class="btn-brawl" onclick="setup('sis2')">SISTEMA 2X2 🐯</button>
        <button class="btn-brawl" onclick="setup('sis3')">SISTEMA 3X3 🦁</button>
    </div>

    <div id="sub-menu" style="display:none;">
        <button class="btn-brawl" onclick="setup('lin-p')">PUNTO-PENDIENTE</button>
        <button class="btn-brawl" onclick="setup('lin-g')">FORMA GENERAL</button>
        <button class="btn-brawl" style="background:#7f8c8d" onclick="goHome()">ATRÁS</button>
    </div>

    <div id="calc-screen" style="display:none;">
        <div class="michi-box">
            <!-- AQUÍ LE DAS CLIC PARA LA INFO -->
            <div class="emoji-click" onclick="popInfo()">🐱</div>
            <div id="hint-text" class="bubble">Toca al gato para ver la ayuda</div>
        </div>
        
        <div id="inputs-container" class="input-grid"></div>
        
        <button class="btn-brawl" onclick="calculate()">RESOLVER</button>
        
        <div id="result-display" class="res-box" style="display:none;"></div>
        
        <button class="btn-brawl" style="background:#e74c3c" onclick="goHome()">INICIO</button>
    </div>
</div>

<script>
    let currentMode = '';
    const descriptions = {
        'lin-p': "Fórmula: y - y1 = m(x - x1). Ideal cuando tienes la pendiente y un punto de paso.",
        'lin-g': "Fórmula: Ax + By + C = 0. La forma estándar para representar líneas rectas.",
        'cuad': "Fórmula: ax² + bx + c = 0. Usamos la fórmula general para encontrar x1 y x2.",
        'sis2': "Dos ecuaciones con dos incógnitas. Encuentra el punto donde se cruzan las líneas.",
        'sis3': "Tres ecuaciones con tres incógnitas. Resuelto por el método de Cramer (Determinantes)."
    };

    function showSub() {
        document.getElementById('home').style.display = 'none';
        document.getElementById('sub-menu').style.display = 'block';
    }

    function goHome() {
        document.getElementById('home').style.display = 'block';
        document.getElementById('sub-menu').style.display = 'none';
        document.getElementById('calc-screen').style.display = 'none';
    }

    function popInfo() {
        alert(descriptions[currentMode]);
    }

    function setup(mode) {
        currentMode = mode;
        document.getElementById('home').style.display = 'none';
        document.getElementById('sub-menu').style.display = 'none';
        document.getElementById('calc-screen').style.display = 'block';
        document.getElementById('result-display').style.display = 'none';
        
        const container = document.getElementById('inputs-container');
        const hint = document.getElementById('hint-text');

        if(mode === 'lin-p') {
            hint.innerText = "y - y1 = m(x - x1)";
            container.innerHTML = 'm: <input id="n1"> x1: <input id="n2"> y1: <input id="n3">';
        } else if(mode === 'lin-g') {
            hint.innerText = "Ax + By + C = 0";
            container.innerHTML = 'A: <input id="n1"> B: <input id="n2"> C: <input id="n3">';
        } else if(mode === 'cuad') {
            hint.innerText = "ax² + bx + c = 0";
            container.innerHTML = 'a: <input id="n1"> b: <input id="n2"> c: <input id="n3">';
        } else if(mode === 'sis2') {
            hint.innerText = "Sistema de Ecuaciones 2x2";
            container.innerHTML = 'L1: <input id="n1">x + <input id="n2">y = <input id="n3"><br>L2: <input id="n4">x + <input id="n5">y = <input id="n6">';
        } else if(mode === 'sis3') {
            hint.innerText = "Sistema 3x3 (Método Cramer)";
            container.innerHTML = 'E1: <input id="n1">x+<input id="n2">y+<input id="n3">z=<input id="n4"><br>E2: <input id="n5">x+<input id="n6">y+<input id="n7">z=<input id="n8"><br>E3: <input id="n9">x+<input id="n10">y+<input id="n11">z=<input id="n12">';
        }
    }

    function calculate() {
        const resDiv = document.getElementById('result-display');
        resDiv.style.display = 'block';
        const val = (id) => parseFloat(document.getElementById(id).value);

        try {
            if(currentMode === 'sis3') {
                const a1=val('n1'), b1=val('n2'), c1=val('n3'), d1=val('n4');
                const a2=val('n5'), b2=val('n6'), c2=val('n7'), d2=val('n8');
                const a3=val('n9'), b3=val('n10'), c3=val('n11'), d3=val('n12');

                const det = a1*(b2*c3 - b3*c2) - b1*(a2*c3 - a3*c2) + c1*(a2*b3 - a3*b2);
                
                if(det === 0) {
                    resDiv.innerText = "El sistema no tiene solución única.";
                } else {
                    const dx = d1*(b2*c3 - b3*c2) - b1*(d2*c3 - d3*c2) + c1*(d2*b3 - d3*b2);
                    const dy = a1*(d2*c3 - d3*c2) - d1*(a2*c3 - a3*c2) + c1*(a2*d3 - a3*d2);
                    const dz = a1*(b2*d3 - b3*d2) - b1*(a2*d3 - a3*d2) + d1*(a2*b3 - a3*b2);
                    resDiv.innerHTML = `X = ${(dx/det).toFixed(2)}<br>Y = ${(dy/det).toFixed(2)}<br>Z = ${(dz/det).toFixed(2)}`;
                }
            } else {
                resDiv.innerText = "Resultado listo (Lógica pendiente)";
            }
        } catch(e) {
            resDiv.innerText = "Error: Llena todos los campos.";
        }
    }
</script>

</body>
</html>
