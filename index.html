<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Mancho - Meow Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFCC00;
            --bg: #2C3E50;
            --btn-blue: #3498DB;
            --btn-red: #E74C3C;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .brawl-card {
            background: #34495E;
            border: 6px solid #000;
            border-radius: 25px;
            padding: 25px;
            width: 100%;
            max-width: 650px;
            box-shadow: 12px 12px 0px rgba(0,0,0,0.4);
            text-align: center;
        }

        h1 {
            font-family: 'Luckiest Guy', cursive;
            color: var(--primary);
            text-shadow: 4px 4px 0px #000;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .btn-brawl {
            font-family: 'Luckiest Guy', cursive;
            width: 95%;
            padding: 15px;
            margin: 10px auto;
            font-size: 1.4rem;
            color: white;
            background: var(--primary);
            border: 4px solid #000;
            border-radius: 15px;
            cursor: pointer;
            text-shadow: 2px 2px 0px #000;
            box-shadow: 0 6px 0px rgba(0,0,0,0.3);
            display: block;
        }

        .nav-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .btn-nav {
            font-family: 'Luckiest Guy', cursive;
            flex: 1;
            padding: 12px;
            font-size: 1.2rem;
            color: white;
            border: 4px solid #000;
            border-radius: 15px;
            cursor: pointer;
            text-shadow: 2px 2px 0px #000;
            box-shadow: 0 5px 0px rgba(0,0,0,0.3);
        }

        .btn-blue { background: var(--btn-blue); }
        .btn-red { background: var(--btn-red); }

        .michi-dialog {
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 30px;
            margin-bottom: 20px;
            border: 4px solid #1c2833;
        }

        .michi-icon { 
            font-size: 50px; 
            background: white; 
            border-radius: 50%; 
            padding: 5px; 
            border: 4px solid #000;
            min-width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer; 
            transition: transform 0.2s;
        }

        .michi-icon:hover { transform: scale(1.1); }

        .bubble {
            background: white;
            border: 4px solid #000;
            border-radius: 20px;
            padding: 15px;
            margin-left: 20px;
            font-weight: bold;
            color: #333;
            flex: 1;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
        }

        .modal-content {
            background-color: white;
            margin: 15% auto;
            padding: 25px;
            border: 6px solid #000;
            border-radius: 25px;
            width: 80%;
            max-width: 400px;
            text-align: center;
            box-shadow: 8px 8px 0px var(--primary);
        }

        .modal-title { font-family: 'Luckiest Guy', cursive; font-size: 1.8rem; margin-bottom: 10px; color: #333; }
        .modal-text { font-weight: bold; line-height: 1.4; color: #555; margin-bottom: 20px; }

        .section { display: none; }
        .input-group { margin: 15px 0; color: white; font-weight: bold; font-size: 1.2rem; }
        input { font-family: 'Luckiest Guy', cursive; border: 3px solid #000; border-radius: 10px; padding: 8px; width: 65px; margin: 0 5px; text-align: center; }
        .res-box { background: white; border: 4px solid #000; border-radius: 15px; padding: 20px; margin: 15px 0; color: #333; font-weight: bold; white-space: pre-line; }
        canvas { background: white; border-radius: 20px; border: 4px solid #000; margin-top: 15px; }
    </style>
</head>
<body>

<div id="michiModal" class="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div id="modal-title" class="modal-title">INFO</div>
        <p id="modal-text" class="modal-text"></p>
        <button class="btn-brawl" style="font-size: 1.1rem; padding: 10px;" onclick="closeModal()">¡ENTENDIDO!</button>
    </div>
</div>

<div class="brawl-card">
    <h1>CALCULADORA MANCHO</h1>

    <div id="main-menu">
        <button class="btn-brawl" onclick="startMode('lineal')">LINEAL 🐾</button>
        <button class="btn-brawl" onclick="startMode('cuadratica')">CUADRÁTICA 🐱</button>
        <button class="btn-brawl" onclick="startMode('sistema')">SISTEMA 2X2 🐯</button>
        <button class="btn-brawl" onclick="startMode('sistema3x3')">SISTEMA 3X3 🦁</button>
    </div>

    <div id="calc-mode" class="section">
        <div class="michi-dialog">
            <div id="michi-img" class="michi-icon" onclick="showInfo()">🐱</div>
            <div class="bubble" id="michi-speech">¡Miau! Toca mi cara para aprender.</div>
        </div>

        <div id="input-container"></div>
        <button class="btn-brawl" onclick="process()">¡ATAQUE CALCULADO!</button>
        <div id="result" class="res-box" style="display:none"></div>
        <canvas id="myChart"></canvas>

        <div class="nav-container">
            <button class="btn-nav btn-blue" onclick="resetInputs()">REINTENTAR 🔄</button>
            <button class="btn-nav btn-red" onclick="goHome()">MENÚ 🏠</button>
        </div>
    </div>
</div>

<script>
    let currentMode = '';
    let myChart = null;

    const infoData = {
        lineal: { t: "LINEAL 🐾", d: "Es una línea recta. Representa un cambio constante. ¡Buscamos el punto exacto donde la línea cruza el suelo!" },
        cuadratica: { t: "CUADRÁTICA 🐱", d: "Forma una curva llamada parábola. ¡Es como el arco que hace un michi al saltar por su comida!" },
        sistema: { t: "SISTEMA 2X2 🐯", d: "Dos líneas que se cruzan. La solución es el punto de encuentro donde ambos michis se ven cara a cara." },
        sistema3x3: { t: "SISTEMA 3X3 🦁", d: "¡Nivel Mega Michi! Tres variables (X, Y, Z). Es como resolver un cubo Rubik matemático." }
    };

    function showInfo() {
        const info = infoData[currentMode];
        document.getElementById('modal-title').innerText = info.t;
        document.getElementById('modal-text').innerText = info.d;
        document.getElementById('michiModal').style.display = 'block';
    }

    function closeModal() { document.getElementById('michiModal').style.display = 'none'; }

    function startMode(mode) {
        currentMode = mode;
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('calc-mode').style.display = 'block';
        document.getElementById('result').style.display = 'none';
        if(myChart) myChart.destroy();
        document.getElementById('myChart').style.display = (mode === 'sistema3x3') ? 'none' : 'block';

        const container = document.getElementById('input-container');
        const icon = document.getElementById('michi-img');

        if(mode === 'lineal') {
            icon.innerText = '🐱';
            container.innerHTML = '<div class="input-group">y = <input type="number" id="a" placeholder="A"> x + <input type="number" id="b" placeholder="B"></div>';
        } else if(mode === 'cuadratica') {
            icon.innerText = '🐈';
            container.innerHTML = '<div class="input-group"><input type="number" id="a">x² + <input type="number" id="b">x + <input type="number" id="c"> = 0</div>';
        } else if(mode === 'sistema') {
            icon.innerText = '🐯';
            container.innerHTML = '<div class="input-group">L1: <input type="number" id="a1">x + <input type="number" id="b1">y = <input type="number" id="c1"></div>' +
                                  '<div class="input-group">L2: <input type="number" id="a2">x + <input type="number" id="b2">y = <input type="number" id="c2"></div>';
        } else if(mode === 'sistema3x3') {
            icon.innerText = '🦁';
            container.innerHTML = 
                '<div class="input-group">E1: <input type="number" id="a1">x + <input type="number" id="b1">y + <input type="number" id="c1">z = <input type="number" id="d1"></div>' +
                '<div class="input-group">E2: <input type="number" id="a2">x + <input type="number" id="b2">y + <input type="number" id="c2">z = <input type="number" id="d2"></div>' +
                '<div class="input-group">E3: <input type="number" id="a3">x + <input type="number" id="b3">y + <input type="number" id="c3">z = <input type="number" id="d3"></div>';
        }
    }

    function resetInputs() { startMode(currentMode); }
    function goHome() { 
        document.getElementById('main-menu').style.display = 'block'; 
        document.getElementById('calc-mode').style.display = 'none'; 
    }

    function process() {
        const resDiv = document.getElementById('result');
        resDiv.style.display = 'block';
        const labels = Array.from({length: 21}, (_, i) => i - 10);

        try {
            if(currentMode === 'lineal') {
                const a = parseFloat(document.getElementById('a').value), b = parseFloat(document.getElementById('b').value);
                resDiv.innerText = `x = ${(-b/a).toFixed(2)}`;
                draw([{label: 'Ruta', data: labels.map(i => a*i+b), borderColor: 'orange'}]);
            } else if(currentMode === 'cuadratica') {
                const a=parseFloat(document.getElementById('a').value), b=parseFloat(document.getElementById('b').value), c=parseFloat(document.getElementById('c').value);
                const d = b*b - 4*a*c;
                resDiv.innerText = d < 0 ? "Sin solución real" : `x1=${((-b+Math.sqrt(d))/(2*a)).toFixed(2)}\nx2=${((-b-Math.sqrt(d))/(2*a)).toFixed(2)}`;
                draw([{label: 'Salto', data: labels.map(i => a*i*i + b*i + c), borderColor: 'red'}]);
            } else if(currentMode === 'sistema') {
                const a1=parseFloat(document.getElementById('a1').value), b1=parseFloat(document.getElementById('b1').value), c1=parseFloat(document.getElementById('c1').value);
                const a2=parseFloat(document.getElementById('a2').value), b2=parseFloat(document.getElementById('b2').value), c2=parseFloat(document.getElementById('c2').value);
                const det = a1*b2 - a2*b1;
                if(det === 0) resDiv.innerText = "Sin solución única";
                else {
                    resDiv.innerText = `x = ${((c1*b2 - c2*b1)/det).toFixed(2)}\ny = ${((a1*c2 - a2*c1)/det).toFixed(2)}`;
                    draw([{label: 'M1', data: labels.map(i => (c1-a1*i)/b1), borderColor: 'cyan'}, {label: 'M2', data: labels.map(i => (c2-a2*i)/b2), borderColor: 'yellow'}]);
                }
            } else if(currentMode === 'sistema3x3') {
                const getV = (id) => parseFloat(document.getElementById(id).value);
                const a1=getV('a1'), b1=getV('b1'), c1=getV('c1'), d1=getV('d1');
                const a2=getV('a2'), b2=getV('b2'), c2=getV('c2'), d2=getV('d2');
                const a3=getV('a3'), b3=getV('b3'), c3=getV('c3'), d3=getV('d3');
                const detS = a1*(b2*c3 - b3*c2) - b1*(a2*c3 - a3*c2) + c1*(a2*b3 - a3*b2);
                if(Math.abs(detS) < 0.001) resDiv.innerText = "Sin solución única";
                else {
                    const x = (d1*(b2*c3 - b3*c2) - b1*(d2*c3 - d3*c2) + c1*(d2*b3 - d3*b2)) / detS;
                    const y = (a1*(d2*c3 - d3*c2) - d1*(a2*c3 - a3*c2) + c1*(a2*d3 - a3*d2)) / detS;
                    const z = (a1*(b2*d3 - b3*d2) - b1*(a2*d3 - a3*d2) + d1*(a2*b3 - a3*b2)) / detS;
                    resDiv.innerText = `x = ${x.toFixed(2)}\ny = ${y.toFixed(2)}\nz = ${z.toFixed(2)}`;
                }
            }
        } catch(e) { resDiv.innerText = "Error en los datos"; }
    }

    function draw(datasets) {
        if(myChart) myChart.destroy();
        myChart = new Chart(document.getElementById('myChart'), {
            type: 'line',
            data: { labels: Array.from({length: 21}, (_, i) => i - 10), datasets: datasets },
            options: { responsive: true, scales: { y: { grid: { color: 'rgba(0,0,0,0.1)' } } } }
        });
    }
</script>
</body>
</html>
