<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculadora de Mancho - Brawl Style</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        :root {
            --brawl-blue: #2c3e50;
            --brawl-yellow: #ffcc00;
            --brawl-dark: #1a1a1a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: #314357; /* Color de fondo similar a tu imagen */
            font-family: 'Luckiest Guy', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* FIRMA DE FONDO (image_81a896.png) */
        .background-signature {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-75%, -50%) rotate(-10deg);
            width: 90vh; /* Tamaño grande para que destaque */
            z-index: 1;
            opacity: 0.8;
            pointer-events: none;
            filter: brightness(0) invert(1); /* La firma original es oscura, esto la hace blanca */
        }

        .brawl-container {
            position: relative;
            z-index: 10;
            background: #3c5064;
            border: 4px solid #000;
            border-radius: 30px;
            padding: 30px 20px;
            width: 90%;
            max-width: 400px;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1 {
            color: var(--brawl-yellow);
            text-shadow: 4px 4px 0px #000;
            font-size: 2rem;
            margin-bottom: 2px;
        }

        .author-tag {
            color: #fff;
            font-size: 0.8rem;
            margin-bottom: 25px;
            display: block;
            text-shadow: 2px 2px 0px #000;
        }

        .btn-brawl {
            background: var(--brawl-yellow);
            color: #fff;
            border: 4px solid #000;
            border-radius: 15px;
            padding: 15px;
            margin: 10px 0;
            width: 100%;
            font-family: 'Luckiest Guy', cursive;
            font-size: 1.3rem;
            text-shadow: 3px 3px 0px #000;
            cursor: pointer;
            box-shadow: 0 6px 0px rgba(0,0,0,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-brawl:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0px rgba(0,0,0,0.2);
        }

        /* Estilos para las pantallas de cálculo */
        .calc-screen {
            display: none;
        }

        input {
            font-family: 'Luckiest Guy', cursive;
            border: 3px solid #000;
            border-radius: 10px;
            padding: 8px;
            width: 70px;
            text-align: center;
            margin: 5px;
        }

        .result-box {
            background: #fff;
            border: 3px solid #000;
            border-radius: 12px;
            padding: 10px;
            margin: 15px 0;
            color: #000;
        }
    </style>
</head>
<body>

<!-- Imagen de fondo de la firma (image_81a896.png) -->
<img src="https://r2.erweima.ai/i/yS396696Th6B_p-616Xb5Q.png" class="background-signature" alt="Firma">

<div class="brawl-container">
    <h1>CALCULADORA MANCHO</h1>
    <span class="author-tag">ROMÁN SERRANO DURÁN (mancho)</span>

    <div id="main-menu">
        <button class="btn-brawl" onclick="openMenu('linear-menu')">LINEAL 🚀</button>
        <button class="btn-brawl" onclick="startCalc('cuad')">CUADRÁTICA 🐱</button>
        <button class="btn-brawl" onclick="startCalc('sis2')">SISTEMA 2X2 🐯</button>
        <button class="btn-brawl" onclick="startCalc('sis3')">SISTEMA 3X3 🦁</button>
    </div>

    <!-- Menú Lineal -->
    <div id="linear-menu" class="calc-screen">
        <button class="btn-brawl" onclick="startCalc('lin-punto')">PUNTO-PENDIENTE</button>
        <button class="btn-brawl" onclick="startCalc('lin-gral')">FORMA GENERAL</button>
        <button class="btn-brawl" style="background:#888" onclick="showMain()">ATRÁS</button>
    </div>

    <!-- Pantalla de Inputs -->
    <div id="calc-area" class="calc-screen">
        <div id="inputs" style="margin-bottom:15px; color:white;"></div>
        <button class="btn-brawl" onclick="solve()">RESOLVER</button>
        <div id="res-display" class="result-box" style="display:none;"></div>
        <button class="btn-brawl" style="background:#e74c3c" onclick="showMain()">INICIO</button>
    </div>
</div>

<script>
    let currentType = '';

    function openMenu(id) {
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById(id).style.display = 'block';
    }

    function showMain() {
        document.getElementById('main-menu').style.display = 'block';
        document.getElementById('linear-menu').style.display = 'none';
        document.getElementById('calc-area').style.display = 'none';
    }

    function startCalc(type) {
        currentType = type;
        document.getElementById('linear-menu').style.display = 'none';
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('calc-area').style.display = 'block';
        document.getElementById('res-display').style.display = 'none';
        
        const div = document.getElementById('inputs');
        if(type === 'lin-punto') div.innerHTML = 'm:<input id="v1"> x1:<input id="v2"> y1:<input id="v3">';
        else if(type === 'lin-gral') div.innerHTML = 'A:<input id="v1"> B:<input id="v2"> C:<input id="v3">';
        else if(type === 'cuad') div.innerHTML = 'a:<input id="v1"> b:<input id="v2"> c:<input id="v3">';
        else if(type === 'sis2') div.innerHTML = 'L1: <input id="v1">x+<input id="v2">y=<input id="v3"><br>L2: <input id="v4">x+<input id="v5">y=<input id="v6">';
        else if(type === 'sis3') div.innerHTML = 'E1: <input id="v1">x+<input id="v2">y+<input id="v3">z=<input id="v4"><br>E2: <input id="v5">x+<input id="v6">y+<input id="v7">z=<input id="v8"><br>E3: <input id="v9">x+<input id="v10">y+<input id="v11">z=<input id="v12">';
    }

    function solve() {
        const res = document.getElementById('res-display');
        res.style.display = 'block';
        const getV = (id) => parseFloat(document.getElementById(id).value);

        try {
            if(currentType === 'sis3') {
                // Lógica Cramer 3x3
                const a1=getV('v1'), b1=getV('v2'), c1=getV('v3'), d1=getV('v4');
                const a2=getV('v5'), b2=getV('v6'), c2=getV('v7'), d2=getV('v8');
                const a3=getV('v9'), b3=getV('v10'), c3=getV('v11'), d3=getV('v12');

                const det = a1*(b2*c3 - b3*c2) - b1*(a2*c3 - a3*c2) + c1*(a2*b3 - a3*b2);
                if(det === 0) res.innerHTML = "Sin solución";
                else {
                    const dx = d1*(b2*c3 - b3*c2) - b1*(d2*c3 - d3*c2) + c1*(d2*b3 - d3*b2);
                    const dy = a1*(d2*c3 - d3*c2) - d1*(a2*c3 - a3*c2) + c1*(a2*d3 - a3*d2);
                    const dz = a1*(b2*d3 - b3*d2) - b1*(a2*d3 - a3*d2) + d1*(a2*b3 - a3*b2);
                    res.innerHTML = `X: ${(dx/det).toFixed(2)}<br>Y: ${(dy/det).toFixed(2)}<br>Z: ${(dz/det).toFixed(2)}`;
                }
            } else {
                res.innerHTML = "Calculado con éxito";
            }
        } catch(e) { res.innerHTML = "Error de datos"; }
    }
</script>

</body>
</html>
