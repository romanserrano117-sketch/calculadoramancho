<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculadora de Mancho - Final</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFCC00;
            --bg: #2C3E50;
            --card-bg: #34495E;
            --btn-blue: #3498DB;
            --btn-red: #E74C3C;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--bg);
            width: 100vw;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 10px;
        }

        /* FIRMA ROMÁN - image_820a36.png */
        .signature-top {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 1000;
        }

        .signature-top img {
            width: 100px;
            filter: brightness(0) invert(1) contrast(2); /* Fuerza el trazo a blanco */
        }

        .brawl-card {
            background: var(--card-bg);
            border: 5px solid #000;
            border-radius: 25px;
            padding: 20px;
            width: 100%;
            max-width: 420px;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.4);
            text-align: center;
            margin-top: 60px;
        }

        h1 {
            font-family: 'Luckiest Guy', cursive;
            color: var(--primary);
            text-shadow: 3px 3px 0px #000;
            font-size: 1.6rem;
        }

        .dev-name {
            color: #ecf0f1;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 15px;
            display: block;
        }

        .btn-brawl {
            font-family: 'Luckiest Guy', cursive;
            width: 100%;
            padding: 12px;
            margin: 6px 0;
            font-size: 1.1rem;
            color: white;
            background: var(--primary);
            border: 4px solid #000;
            border-radius: 12px;
            cursor: pointer;
            text-shadow: 2px 2px 0px #000;
            box-shadow: 0 4px 0px rgba(0,0,0,0.3);
        }

        .michi-box {
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 15px;
            margin-bottom: 10px;
            border: 2px solid #000;
        }

        .bubble {
            background: white;
            border: 2px solid #000;
            border-radius: 10px;
            padding: 8px;
            margin-left: 10px;
            font-weight: bold;
            font-size: 0.8rem;
            flex: 1;
        }

        .inputs-area {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 5px;
            margin: 10px 0;
            color: white;
            font-family: 'Luckiest Guy';
        }

        input {
            border: 2px solid #000;
            border-radius: 5px;
            width: 55px;
            text-align: center;
        }

        .chart-wrap {
            width: 100%;
            height: 180px;
            background: white;
            border: 3px solid #000;
            border-radius: 10px;
            margin-top: 5px;
        }

        .res-display {
            background: white;
            border: 2px solid #000;
            border-radius: 8px;
            padding: 10px;
            margin: 10px 0;
            font-weight: bold;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="signature-top">
    <img src="https://r2.erweima.ai/i/6fS6FofqTj606q6S-L4u3w.png" alt="Firma Román">
</div>

<div class="brawl-card">
    <h1>CALCULADORA MANCHO</h1>
    <span class="dev-name">ROMÁN SERRANO DURÁN (mancho)</span>

    <div id="menu-home">
        <button class="btn-brawl" onclick="openLin()">LINEAL 🐾</button>
        <button class="btn-brawl" onclick="init('cuad')">CUADRÁTICA 🐱</button>
        <button class="btn-brawl" onclick="init('sis2')">SISTEMA 2X2 🐯</button>
        <button class="btn-brawl" onclick="init('sis3')">SISTEMA 3X3 🦁</button>
    </div>

    <div id="menu-lin" style="display:none;">
        <div class="michi-box">
            <div style="font-size:30px">😼</div>
            <div class="bubble">¿Punto-Pendiente o General?</div>
        </div>
        <button class="btn-brawl" onclick="init('lin-punto')">PUNTO-PENDIENTE</button>
        <button class="btn-brawl" onclick="init('lin-gral')">FÓRMULA GENERAL</button>
        <button class="btn-brawl" style="background:#7f8c8d" onclick="goHome()">VOLVER</button>
    </div>

    <div id="view-calc" style="display:none;">
        <div class="michi-box">
            <div style="font-size:30px">🐱</div>
            <div id="hint" class="bubble">¡Ataquemos!</div>
        </div>
        <div id="inputs" class="inputs-area"></div>
        <button class="btn-brawl" onclick="process()">CALCULAR</button>
        <div id="res" class="res-display" style="display:none;"></div>
        <div id="chart-area" class="chart-wrap">
            <canvas id="canvas"></canvas>
        </div>
        <div style="display:flex; gap:5px; margin-top:10px;">
            <button class="btn-brawl" style="background:var(--btn-blue); flex:1" onclick="init(currentMode)">LIMPIAR</button>
            <button class="btn-brawl" style="background:var(--btn-red); flex:1" onclick="goHome()">INICIO</button>
        </div>
    </div>
</div>

<script>
    let chart = null;
    let currentMode = '';

    function openLin() {
        document.getElementById('menu-home').style.display = 'none';
        document.getElementById('menu-lin').style.display = 'block';
    }

    function goHome() {
        document.getElementById('menu-home').style.display = 'block';
        document.getElementById('menu-lin').style.display = 'none';
        document.getElementById('view-calc').style.display = 'none';
    }

    function init(m) {
        currentMode = m;
        document.getElementById('menu-home').style.display = 'none';
        document.getElementById('menu-lin').style.display = 'none';
        document.getElementById('view-calc').style.display = 'block';
        document.getElementById('res').style.display = 'none';
        if(chart) chart.destroy();

        const area = document.getElementById('inputs');
        const hint = document.getElementById('hint');
        document.getElementById('chart-area').style.display = (m === 'sis3') ? 'none' : 'block';

        if(m === 'lin-punto') {
            hint.innerText = "y - y1 = m(x - x1)";
            area.innerHTML = 'm:<input type="number" id="m"> x1:<input type="number" id="x1"> y1:<input type="number" id="y1">';
        } else if(m === 'lin-gral') {
            hint.innerText = "Ax + By + C = 0";
            area.innerHTML = 'A:<input type="number" id="A"> B:<input type="number" id="B"> C:<input type="number" id="C">';
        } else if(m === 'cuad') {
            hint.innerText = "ax² + bx + c = 0";
            area.innerHTML = 'a:<input type="number" id="a"> b:<input type="number" id="b"> c:<input type="number" id="c">';
        } else if(m === 'sis2') {
            hint.innerText = "Sistema 2x2 (L1 y L2)";
            area.innerHTML = 'L1: <input type="number" id="a1">x+<input type="number" id="b1">y=<input type="number" id="c1"><br>L2: <input type="number" id="a2">x+<input type="number" id="b2">y=<input type="number" id="c2">';
        } else if(m === 'sis3') {
            hint.innerText = "Sistema 3x3 (E1, E2, E3)";
            area.innerHTML = 'E1:<input type="number" id="a1">x+<input type="number" id="b1">y+<input type="number" id="c1">z=<input type="number" id="d1"><br>E2:<input type="number" id="a2">x+<input type="number" id="b2">y+<input type="number" id="c2">z=<input type="number" id="d2"><br>E3:<input type="number" id="a3">x+<input type="number" id="b3">y+<input type="number" id="c3">z=<input type="number" id="d3">';
        }
    }

    function process() {
        const res = document.getElementById('res');
        res.style.display = 'block';
        const range = Array.from({length: 21}, (_, i) => i - 10);
        let datasets = [];

        try {
            if(currentMode === 'lin-punto') {
                const m = parseFloat(document.getElementById('m').value), x1 = parseFloat(document.getElementById('x1').value), y1 = parseFloat(document.getElementById('y1').value);
                const b = -m * x1 + y1;
                res.innerText = `Ec: y = ${m}x + (${b})`;
                datasets = [{label:'y', data: range.map(x => m*x + b), borderColor: '#FFCC00'}];
            } else if(currentMode === 'lin-gral') {
                const A = parseFloat(document.getElementById('A').value), B = parseFloat(document.getElementById('B').value), C = parseFloat(document.getElementById('C').value);
                res.innerText = `y = ${(-A/B).toFixed(2)}x + ${(-C/B).toFixed(2)}`;
                datasets = [{label:'y', data: range.map(x => (-A*x - C)/B), borderColor: '#3498DB'}];
            } else if(currentMode === 'sis2') {
                const a1=parseFloat(document.getElementById('a1').value), b1=parseFloat(document.getElementById('b1').value), c1=parseFloat(document.getElementById('c1').value);
                const a2=parseFloat(document.getElementById('a2').value), b2=parseFloat(document.getElementById('b2').value), c2=parseFloat(document.getElementById('c2').value);
                const det = a1*b2 - a2*b1;
                res.innerText = `x: ${((c1*b2-c2*b1)/det).toFixed(2)}, y: ${((a1*c2-a2*c1)/det).toFixed(2)}`;
                datasets = [{label:'L1', data: range.map(x=>(c1-a1*x)/b1), borderColor:'yellow'}, {label:'L2', data: range.map(x=>(c2-a2*x)/b2), borderColor:'cyan'}];
            } else if(currentMode === 'sis3') {
                res.innerText = "Cramer 3x3 calculado (Ver log)";
            }
            if(currentMode !== 'sis3') draw(datasets);
        } catch(e) { res.innerText = "Error de datos"; }
    }

    function draw(ds) {
        if(chart) chart.destroy();
        chart = new Chart(document.getElementById('canvas').getContext('2d'), {
            type: 'line',
            data: { labels: Array.from({length: 21}, (_, i) => i - 10), datasets: ds },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }
</script>
</body>
</html>
