<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculadora de Mancho - Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFCC00;
            --bg: #2C3E50;
            --card-bg: #34495E;
            --btn-blue: #3498DB;
            --btn-red: #E74C3C;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--bg);
            width: 100vw;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
            padding: 10px;
        }

        /* FIRMA DE image_820a36.png */
        .signature-fixed {
            position: fixed;
            top: 15px;
            right: 15px;
            width: 100px;
            z-index: 1000;
            filter: contrast(1.2) brightness(1.1);
            mix-blend-mode: screen; 
            pointer-events: none;
        }

        .brawl-card {
            background: var(--card-bg);
            border: 5px solid #000;
            border-radius: 25px;
            padding: 20px;
            width: 100%;
            max-width: 450px;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.4);
            text-align: center;
            margin-top: 60px;
            position: relative;
        }

        h1 {
            font-family: 'Luckiest Guy', cursive;
            color: var(--primary);
            text-shadow: 3px 3px 0px #000;
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        .author-text {
            color: #ecf0f1;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 20px;
            display: block;
        }

        .btn-brawl {
            font-family: 'Luckiest Guy', cursive;
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            font-size: 1.1rem;
            color: white;
            background: var(--primary);
            border: 4px solid #000;
            border-radius: 15px;
            cursor: pointer;
            text-shadow: 2px 2px 0px #000;
            box-shadow: 0 4px 0px rgba(0,0,0,0.3);
        }

        .michi-box {
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.3);
            padding: 12px;
            border-radius: 20px;
            margin-bottom: 15px;
            border: 2px solid #000;
        }

        .michi-head {
            font-size: 35px;
            background: white;
            border: 3px solid #000;
            border-radius: 50%;
            width: 55px; height: 55px;
            display: flex; align-items: center; justify-content: center;
        }

        .bubble-msg {
            background: white;
            border: 3px solid #000;
            border-radius: 12px;
            padding: 10px;
            margin-left: 10px;
            font-weight: bold;
            font-size: 0.85rem;
            flex: 1;
        }

        .input-area {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
            color: white;
            font-family: 'Luckiest Guy', cursive;
        }

        input {
            border: 3px solid #000;
            border-radius: 10px;
            padding: 8px;
            width: 65px;
            text-align: center;
            font-size: 1rem;
        }

        .res-display {
            background: #fff;
            border: 3px solid #000;
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
            font-weight: bold;
        }

        .canvas-container {
            width: 100%;
            height: 200px;
            background: #fff;
            border: 4px solid #000;
            border-radius: 15px;
            margin-top: 10px;
        }

        .nav-grid { display: flex; gap: 10px; margin-top: 15px; }
        .btn-nav { font-family: 'Luckiest Guy'; flex: 1; padding: 10px; border: 3px solid #000; border-radius: 12px; color: white; }
    </style>
</head>
<body>

<img src="https://r2.erweima.ai/i/6fS6FofqTj606q6S-L4u3w.png" class="signature-fixed" alt="Firma">

<div class="brawl-card">
    <h1>CALCULADORA MANCHO</h1>
    <span class="author-text">Por Román Serrano Durán (mancho)</span>

    <div id="main-menu">
        <button class="btn-brawl" onclick="showLinearOptions()">LINEAL 🐾</button>
        <button class="btn-brawl" onclick="init('cuadratica')">CUADRÁTICA 🐱</button>
        <button class="btn-brawl" onclick="init('sistema')">SISTEMA 2X2 🐯</button>
    </div>

    <!-- Submenú Lineal -->
    <div id="linear-menu" style="display:none;">
        <div class="michi-box">
            <div class="michi-head">😼</div>
            <div class="bubble-msg">¿Cómo quieres resolver la recta?</div>
        </div>
        <button class="btn-brawl" onclick="init('lineal-punto')">PUNTO-PENDIENTE</button>
        <button class="btn-brawl" onclick="init('lineal-general')">FÓRMULA GENERAL</button>
        <button class="btn-brawl" style="background:#7f8c8d" onclick="home()">VOLVER</button>
    </div>

    <div id="calc-view" style="display:none;">
        <div class="michi-box">
            <div class="michi-head">🐱</div>
            <div id="instruction" class="bubble-msg">Ingresa los datos para atacar:</div>
        </div>

        <div id="inputs" class="input-area"></div>
        <button class="btn-brawl" onclick="calculate()">CALCULAR</button>
        
        <div id="res-box" class="res-display" style="display:none;"></div>
        
        <div id="chart-wrap" class="canvas-container">
            <canvas id="mainChart"></canvas>
        </div>

        <div class="nav-grid">
            <button class="btn-nav" style="background:var(--btn-blue)" onclick="reset()">LIMPIAR</button>
            <button class="btn-nav" style="background:var(--btn-red)" onclick="home()">INICIO</button>
        </div>
    </div>
</div>

<script>
    let chartInstance = null;
    let mode = '';

    function showLinearOptions() {
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('linear-menu').style.display = 'block';
    }

    function init(m) {
        mode = m;
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('linear-menu').style.display = 'none';
        document.getElementById('calc-view').style.display = 'block';
        document.getElementById('res-box').style.display = 'none';
        if(chartInstance) chartInstance.destroy();

        const container = document.getElementById('inputs');
        const instruction = document.getElementById('instruction');

        if(mode === 'lineal-punto') {
            instruction.innerText = "Usa: y - y1 = m(x - x1)";
            container.innerHTML = 'm=<input type="number" id="m"> x1=<input type="number" id="x1"> y1=<input type="number" id="y1">';
        } else if(mode === 'lineal-general') {
            instruction.innerText = "Usa: Ax + By + C = 0";
            container.innerHTML = 'A=<input type="number" id="A"> B=<input type="number" id="B"> C=<input type="number" id="C">';
        } else if(mode === 'cuadratica') {
            container.innerHTML = '<input type="number" id="a">x² + <input type="number" id="b">x + <input type="number" id="c"> = 0';
        } else if(mode === 'sistema') {
            container.innerHTML = 'L1: <input type="number" id="a1">x+<input type="number" id="b1">y=<input type="number" id="c1"><br>L2: <input type="number" id="a2">x+<input type="number" id="b2">y=<input type="number" id="c2">';
        }
    }

    function home() {
        document.getElementById('main-menu').style.display = 'block';
        document.getElementById('linear-menu').style.display = 'none';
        document.getElementById('calc-view').style.display = 'none';
    }

    function reset() { init(mode); }

    function calculate() {
        const res = document.getElementById('res-box');
        res.style.display = 'block';
        const range = Array.from({length: 21}, (_, i) => i - 10);
        let datasets = [];

        try {
            if(mode === 'lineal-punto') {
                const m = parseFloat(document.getElementById('m').value);
                const x1 = parseFloat(document.getElementById('x1').value);
                const y1 = parseFloat(document.getElementById('y1').value);
                // y = mx - mx1 + y1
                const b = -m * x1 + y1;
                res.innerHTML = `Ecuación: y = ${m}x + (${b})`;
                datasets = [{label: 'Recta', data: range.map(x => m*x + b), borderColor: '#FFCC00', borderWidth: 4}];
            } else if(mode === 'lineal-general') {
                const A = parseFloat(document.getElementById('A').value);
                const B = parseFloat(document.getElementById('B').value);
                const C = parseFloat(document.getElementById('C').value);
                // y = (-Ax - C) / B
                res.innerHTML = `Pendiente: ${(-A/B).toFixed(2)}`;
                datasets = [{label: 'Recta', data: range.map(x => (-A*x - C)/B), borderColor: '#3498DB', borderWidth: 4}];
            } else if(mode === 'cuadratica') {
                const a = parseFloat(document.getElementById('a').value), b = parseFloat(document.getElementById('b').value), c = parseFloat(document.getElementById('c').value);
                const d = b*b - 4*a*c;
                res.innerHTML = d < 0 ? "Raíces imaginarias" : `x1: ${((-b+Math.sqrt(d))/(2*a)).toFixed(2)} x2: ${((-b-Math.sqrt(d))/(2*a)).toFixed(2)}`;
                datasets = [{label: 'Parábola', data: range.map(x => a*x*x + b*x + c), borderColor: '#E74C3C', borderWidth: 4}];
            } else if(mode === 'sistema') {
                const a1=parseFloat(document.getElementById('a1').value), b1=parseFloat(document.getElementById('b1').value), c1=parseFloat(document.getElementById('c1').value);
                const a2=parseFloat(document.getElementById('a2').value), b2=parseFloat(document.getElementById('b2').value), c2=parseFloat(document.getElementById('c2').value);
                const det = a1*b2 - a2*b1;
                res.innerHTML = `Solución: (${((c1*b2-c2*b1)/det).toFixed(2)}, ${((a1*c2-a2*c1)/det).toFixed(2)})`;
                datasets = [{label: 'L1', data: range.map(x=>(c1-a1*x)/b1), borderColor: '#FFCC00'}, {label: 'L2', data: range.map(x=>(c2-a2*x)/b2), borderColor: '#3498DB'}];
            }
            draw(datasets);
        } catch(e) { res.innerText = "¡Revisa los números!"; }
    }

    function draw(ds) {
        if(chartInstance) chartInstance.destroy();
        const ctx = document.getElementById('mainChart').getContext('2d');
        chartInstance = new Chart(ctx, {
            type: 'line',
            data: { labels: Array.from({length: 21}, (_, i) => i - 10), datasets: ds },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }
</script>
</body>
</html>
