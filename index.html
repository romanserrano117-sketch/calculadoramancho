<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculadora de Mancho - Mobile Fixed</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFCC00;
            --bg: #2C3E50;
            --btn-blue: #3498DB;
            --btn-red: #E74C3C;
        }

        /* Reset para evitar desbordamientos */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--bg);
            width: 100vw;
            overflow-x: hidden; /* Evita el scroll horizontal */
            display: flex;
            justify-content: center;
            padding: 10px;
        }

        /* FIRMA FIJA - Siempre visible arriba a la derecha */
        .fixed-signature {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 70px;
            height: auto;
            z-index: 9999;
            mix-blend-mode: multiply;
            background: rgba(255, 255, 255, 0.5); /* Fondo ligero para asegurar visibilidad */
            border-radius: 8px;
            padding: 2px;
        }

        .brawl-card {
            background: #34495E;
            border: 4px solid #000;
            border-radius: 20px;
            padding: 15px;
            width: 100%;
            max-width: 400px; /* Tamaño ideal para teléfonos */
            box-shadow: 6px 6px 0px rgba(0,0,0,0.4);
            text-align: center;
            margin-top: 60px; /* Espacio para que no tape la firma */
        }

        h1 {
            font-family: 'Luckiest Guy', cursive;
            color: var(--primary);
            text-shadow: 2px 2px 0px #000;
            font-size: 1.6rem;
        }

        .dev-credit {
            color: #ecf0f1;
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 15px;
            display: block;
        }

        .btn-brawl {
            font-family: 'Luckiest Guy', cursive;
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            font-size: 1rem;
            color: white;
            background: var(--primary);
            border: 3px solid #000;
            border-radius: 10px;
            cursor: pointer;
            text-shadow: 1px 1px 0px #000;
        }

        .michi-dialog {
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.2);
            padding: 8px;
            border-radius: 15px;
            margin-bottom: 10px;
        }

        .michi-icon { 
            font-size: 30px; 
            background: white; 
            border-radius: 50%; 
            border: 2px solid #000;
            width: 50px; height: 50px;
            display: flex; align-items: center; justify-content: center;
        }

        .bubble {
            background: white;
            border: 2px solid #000;
            border-radius: 10px;
            padding: 8px;
            margin-left: 10px;
            font-weight: bold;
            font-size: 0.75rem;
            flex: 1;
        }

        .input-group {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin: 10px 0;
            color: white;
            font-size: 0.8rem;
            flex-wrap: wrap;
        }

        input {
            font-family: 'Luckiest Guy', cursive;
            border: 2px solid #000;
            border-radius: 5px;
            width: 45px;
            text-align: center;
        }

        /* CONTENEDOR DE GRÁFICA CORREGIDO */
        .chart-wrapper {
            position: relative;
            width: 100%;
            height: 180px; /* Altura fija para evitar saltos */
            margin: 10px 0;
            background: white;
            border: 3px solid #000;
            border-radius: 10px;
            overflow: hidden;
        }

        .res-box {
            background: white;
            border: 2px solid #000;
            border-radius: 10px;
            padding: 10px;
            margin-top: 5px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .nav-container { display: flex; gap: 5px; margin-top: 10px; }
        .btn-nav { flex: 1; padding: 8px; border-radius: 10px; border: 2px solid #000; color: white; font-family: 'Luckiest Guy'; }
        .btn-blue { background: var(--btn-blue); }
        .btn-red { background: var(--btn-red); }
    </style>
</head>
<body>

<!-- Firma fija en la esquina -->
<img src="https://r2.erweima.ai/i/6fS6FofqTj606q6S-L4u3w.png" class="fixed-signature" alt="Román">

<div class="brawl-card">
    <h1>CALCULADORA MANCHO</h1>
    <span class="dev-credit">Por Román Serrano Durán (mancho)</span>

    <div id="main-menu">
        <button class="btn-brawl" onclick="startMode('lineal')">LINEAL 🐾</button>
        <button class="btn-brawl" onclick="startMode('cuadratica')">CUADRÁTICA 🐱</button>
        <button class="btn-brawl" onclick="startMode('sistema')">SISTEMA 2X2 🐯</button>
        <button class="btn-brawl" onclick="startMode('sistema3x3')">SISTEMA 3X3 🦁</button>
    </div>

    <div id="calc-mode" style="display:none;">
        <div class="michi-dialog">
            <div id="michi-img" class="michi-icon">🐱</div>
            <div class="bubble">¡Ingresa los números para atacar!</div>
        </div>

        <div id="input-container"></div>
        <button class="btn-brawl" onclick="process()">CALCULAR</button>
        
        <div id="result" class="res-box" style="display:none"></div>
        
        <div id="chart-area" class="chart-wrapper">
            <canvas id="myChart"></canvas>
        </div>

        <div class="nav-container">
            <button class="btn-nav btn-blue" onclick="resetInputs()">BORRAR</button>
            <button class="btn-nav btn-red" onclick="goHome()">VOLVER</button>
        </div>
    </div>
</div>

<script>
    let myChart = null;
    let currentMode = '';

    function startMode(mode) {
        currentMode = mode;
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('calc-mode').style.display = 'block';
        document.getElementById('result').style.display = 'none';
        if(myChart) myChart.destroy();
        
        const container = document.getElementById('input-container');
        if(mode === 'lineal') container.innerHTML = '<div class="input-group">y = <input type="number" id="a">x + <input type="number" id="b"></div>';
        else if(mode === 'cuadratica') container.innerHTML = '<div class="input-group"><input type="number" id="a">x² + <input type="number" id="b">x + <input type="number" id="c"> = 0</div>';
        else if(mode === 'sistema') container.innerHTML = '<div class="input-group">L1: <input type="number" id="a1">x + <input type="number" id="b1">y = <input type="number" id="c1"></div><div class="input-group">L2: <input type="number" id="a2">x + <input type="number" id="b2">y = <input type="number" id="c2"></div>';
        else if(mode === 'sistema3x3') container.innerHTML = '<div class="input-group">E1: <input type="number" id="a1">x+<input type="number" id="b1">y+<input type="number" id="c1">z=<input type="number" id="d1"></div><div class="input-group">E2: <input type="number" id="a2">x+<input type="number" id="b2">y+<input type="number" id="c2">z=<input type="number" id="d2"></div><div class="input-group">E3: <input type="number" id="a3">x+<input type="number" id="b3">y+<input type="number" id="c3">z=<input type="number" id="d3"></div>';
        
        document.getElementById('chart-area').style.display = (mode === 'sistema3x3') ? 'none' : 'block';
    }

    function goHome() { 
        document.getElementById('main-menu').style.display = 'block'; 
        document.getElementById('calc-mode').style.display = 'none'; 
    }
    
    function resetInputs() { startMode(currentMode); }

    function process() {
        const resDiv = document.getElementById('result');
        resDiv.style.display = 'block';
        const L = Array.from({length: 21}, (_, i) => i - 10);
        let ds = [];

        try {
            if(currentMode === 'lineal') {
                const a = parseFloat(document.getElementById('a').value), b = parseFloat(document.getElementById('b').value);
                resDiv.innerText = `x = ${(-b/a).toFixed(2)}`;
                ds = [{label: 'f(x)', data: L.map(i => a*i+b), borderColor: 'orange'}];
            } else if(currentMode === 'cuadratica') {
                const a=parseFloat(document.getElementById('a').value), b=parseFloat(document.getElementById('b').value), c=parseFloat(document.getElementById('c').value);
                const d = b*b - 4*a*c;
                resDiv.innerText = d < 0 ? "Sin solución" : `x1=${((-b+Math.sqrt(d))/(2*a)).toFixed(2)} x2=${((-b-Math.sqrt(d))/(2*a)).toFixed(2)}`;
                ds = [{label: 'Salto', data: L.map(i => a*i*i + b*i + c), borderColor: 'red'}];
            } else if(currentMode === 'sistema') {
                const a1=parseFloat(document.getElementById('a1').value), b1=parseFloat(document.getElementById('b1').value), c1=parseFloat(document.getElementById('c1').value);
                const a2=parseFloat(document.getElementById('a2').value), b2=parseFloat(document.getElementById('b2').value), c2=parseFloat(document.getElementById('c2').value);
                const det = a1*b2 - a2*b1;
                resDiv.innerText = `x=${((c1*b2-c2*b1)/det).toFixed(2)} y=${((a1*c2-a2*c1)/det).toFixed(2)}`;
                ds = [{label:'L1', data: L.map(i=>(c1-a1*i)/b1), borderColor:'cyan'}, {label:'L2', data: L.map(i=>(c2-a2*i)/b2), borderColor:'yellow'}];
            } else if(currentMode === 'sistema3x3') {
                resDiv.innerText = "Resultado (Cramer listo)";
                // Lógica de Cramer 3x3 aquí...
            }
            if(currentMode !== 'sistema3x3') draw(ds);
        } catch(e) { resDiv.innerText = "¡Error!"; }
    }

    function draw(ds) {
        if(myChart) myChart.destroy();
        const ctx = document.getElementById('myChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'line',
            data: { labels: Array.from({length: 21}, (_, i) => i - 10), datasets: ds },
            options: { 
                responsive: true, 
                maintainAspectRatio: false,
                plugins: { legend: { display: false } }
            }
        });
    }
</script>
</body>
</html>
